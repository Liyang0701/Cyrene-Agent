<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>通话窗口 Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, "Microsoft YaHei", sans-serif; }

  .call {
    width: 720px; height: 1280px; position: relative; overflow: hidden;
    border-radius: 32px;
    background: radial-gradient(ellipse at 30% 20%, rgba(120, 40, 100, 0.35) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(80, 30, 120, 0.3) 0%, transparent 50%),
                linear-gradient(180deg, #0a0815 0%, #14091f 50%, #1a0a28 100%);
    border: 1px solid rgba(255, 190, 226, 0.42);
  }

  /* 粒子 canvas */
  .call__particles { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

  .call__body { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; align-items: center; padding: 60px 40px 50px; }

  /* 状态文字 */
  .call__status {
    color: rgba(255, 255, 255, 0.7); font-size: 18px; letter-spacing: 1px;
    margin-bottom: 80px; transition: color 0.3s;
  }
  .call__status--error { color: #ff6b6b; }
  .call__status--thinking { color: rgba(180, 160, 255, 0.8); }

  /* 头像区域 */
  .call__avatar-zone {
    position: relative; width: 280px; height: 280px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 60px;
  }

  /* 电波环（SPEAKING 时显示） */
  .call__avatar-ring { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
  .call__avatar-ring::before, .call__avatar-ring::after, .call__avatar-ring span {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    border: 2px solid rgba(236, 72, 153, 0.5);
    animation: ring-pulse 2s ease-out infinite;
  }
  .call__avatar-ring::after { animation-delay: 0.6s; }
  .call__avatar-ring span { animation-delay: 1.2s; display: block; }
  @keyframes ring-pulse {
    0% { transform: scale(0.85); opacity: 0.8; border-color: rgba(236, 72, 153, 0.6); }
    100% { transform: scale(1.35); opacity: 0; border-color: rgba(168, 85, 247, 0.1); }
  }

  /* 音量波形（LISTENING 时显示） */
  .call__waveform {
    position: absolute; inset: -20px; z-index: 2;
    transition: opacity 0.2s;
  }
  .call__wavebar {
    position: absolute; bottom: 50%; left: 50%; width: 4px; border-radius: 2px;
    background: linear-gradient(180deg, #ff6ec7, #ec4899);
    transform-origin: bottom center;
  }

  /* 头像 */
  .call__avatar {
    width: 240px; height: 240px; border-radius: 50%;
    z-index: 3; position: relative;
    object-fit: cover;
    border: 3px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 40px rgba(236, 72, 153, 0.3);
    background: linear-gradient(135deg, #2a1a40, #1a0a28);
    display: flex; align-items: center; justify-content: center;
    font-size: 96px;
    margin-top: 20px;
  }

  /* 转写区 */
  .call__transcript {
    flex: 1; width: 100%; max-width: 600px; overflow-y: auto;
    padding: 0 20px; margin-bottom: 40px;
  }
  .call__transcript::-webkit-scrollbar { width: 4px; }
  .call__transcript::-webkit-scrollbar-thumb { background: rgba(236, 72, 153, 0.3); border-radius: 2px; }

  .call__transcript-user {
    text-align: right; color: rgba(255, 255, 255, 0.85); font-size: 16px;
    margin-bottom: 12px; line-height: 1.6;
  }
  .call__transcript-bot {
    text-align: left; color: rgba(255, 200, 230, 0.9); font-size: 16px;
    margin-bottom: 12px; line-height: 1.6;
  }

  /* 挂断键 */
  .call__actions { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 30px; margin-bottom: 50px; }

  /* 挂断键上方柱状胶囊波形（用户说话时跳动） */
  .call__mic-wave {
    display: flex; align-items: flex-end; justify-content: center; gap: 12px;
    height: 90px; transition: opacity 0.2s;
  }
  .call__mic-wave-bar {
    width: 16px; border-radius: 8px;
    background: linear-gradient(180deg, #ff6ec7, #ec4899);
    height: 10px;
    transition: height 0.08s ease-out;
  }

  .call__hangup {
    width: 100px; height: 100px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .call__hangup:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(239, 68, 68, 0.5); }
  .call__hangup:active { transform: scale(0.95); }
  .call__hangup svg { width: 44px; height: 44px; fill: #fff; }

  /* 状态切换按钮（mockup 演示用） */
  .mockup-controls {
    position: fixed; bottom: 20px; right: 20px; display: flex; gap: 8px; z-index: 100;
  }
  .mockup-controls button {
    padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 13px;
  }
  .mockup-controls button.active { background: rgba(236, 72, 153, 0.4); }
</style>
</head>
<body>

<div class="call">
  <canvas class="call__particles" id="particles"></canvas>
  <div class="call__body">
    <div class="call__status" id="status">正在聆听...</div>

    <div class="call__avatar-zone">
      <div class="call__avatar-ring" id="avatar-ring" style="opacity:0">
        <span></span>
      </div>
      <div class="call__waveform" id="waveform" style="opacity:0"></div>
      <div class="call__avatar">👧</div>
    </div>

    <div class="call__transcript" id="transcript" hidden>
    </div>

    <div class="call__actions">
      <div class="call__mic-wave" id="mic-wave" style="opacity:0">
        <div class="call__mic-wave-bar"></div>
        <div class="call__mic-wave-bar"></div>
        <div class="call__mic-wave-bar"></div>
        <div class="call__mic-wave-bar"></div>
      </div>
      <button class="call__hangup" id="hangup">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.965.965 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.7 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48a.965.965 0 0 1-.71.29c-.27 0-.52-.1-.7-.28a11.27 11.27 0 0 0-2.67-1.85.996.996 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="mockup-controls">
  <button onclick="setState('listening')" id="btn-listening" class="active">用户说话</button>
  <button onclick="setState('thinking')" id="btn-thinking">思考中</button>
  <button onclick="setState('speaking')" id="btn-speaking">昔涟说话</button>
  <button onclick="setState('error')" id="btn-error">错误</button>
  <button onclick="toggleTranscript()" id="btn-transcript" style="opacity:0.6">显示文字</button>
</div>

<script>
// 粒子背景
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
canvas.width = 720; canvas.height = 1280;
const particles = [];
for (let i = 0; i < 45; i++) {
  particles.push({
    x: Math.random() * 720, y: Math.random() * 1280,
    size: 0.6 + Math.random() * 2.4,
    vx: (Math.random() - 0.5) * 0.18,
    vy: -0.05 - Math.random() * 0.22,
    hue: 305 + Math.random() * 40,
    alpha: 0.25 + Math.random() * 0.5,
    twinkle: Math.random() * Math.PI * 2,
    twinkleSpeed: 0.005 + Math.random() * 0.012
  });
}
function drawParticles() {
  ctx.clearRect(0, 0, 720, 1280);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.twinkle += p.twinkleSpeed;
    if (p.y < -10) p.y = 1290;
    if (p.x < -10) p.x = 730;
    if (p.x > 730) p.x = -10;
    const flicker = 0.65 + Math.sin(p.twinkle) * 0.35;
    const a = p.alpha * flicker;
    const r = p.size * 3;
    const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    grad.addColorStop(0, `hsla(${p.hue}, 90%, 80%, ${a})`);
    grad.addColorStop(0.5, `hsla(${p.hue}, 90%, 70%, ${a * 0.4})`);
    grad.addColorStop(1, `hsla(${p.hue}, 90%, 70%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
  requestAnimationFrame(drawParticles);
}
drawParticles();

// 波形动画
const waveformEl = document.getElementById('waveform');
const NUM_BARS = 32;
const bars = [];
for (let i = 0; i < NUM_BARS; i++) {
  const bar = document.createElement('div');
  bar.className = 'call__wavebar';
  const angle = (i / NUM_BARS) * Math.PI * 2;
  bar.style.transform = `translate(-50%, 0) rotate(${angle}rad)`;
  bar.style.height = '5px';
  waveformEl.appendChild(bar);
  bars.push({ el: bar, angle, baseHeight: 5 });
}

let waveformMode = 'idle'; // idle, listening, thinking
function animateWaveform() {
  for (const b of bars) {
    let h;
    if (waveformMode === 'listening') {
      h = 5 + Math.random() * 90; // 大幅跳动
    } else if (waveformMode === 'thinking') {
      h = 5 + Math.sin(Date.now() * 0.003 + b.angle) * 4 + 4; // 低振幅缓慢起伏 ~10%
    } else {
      h = 5;
    }
    b.el.style.height = h + 'px';
  }
  requestAnimationFrame(animateWaveform);
}
animateWaveform();

// 挂断键上方柱状胶囊波形（用户说话时跳动）
const micWaveEl = document.getElementById('mic-wave');
const micBars = micWaveEl ? micWaveEl.querySelectorAll('.call__mic-wave-bar') : [];
let micMode = 'idle'; // idle, listening, thinking
function animateMicWave() {
  for (const bar of micBars) {
    let h;
    if (micMode === 'listening') {
      h = 10 + Math.random() * 76; // 10~86px 跳动
    } else if (micMode === 'thinking') {
      h = 10 + Math.sin(Date.now() * 0.004) * 5 + 5; // 低振幅
    } else {
      h = 10;
    }
    bar.style.height = h + 'px';
  }
  requestAnimationFrame(animateMicWave);
}
animateMicWave();

// 状态切换
function setState(state) {
  const status = document.getElementById('status');
  const ring = document.getElementById('avatar-ring');
  const wave = document.getElementById('waveform');
  const micWave = document.getElementById('mic-wave');

  document.querySelectorAll('.mockup-controls button').forEach(b => b.classList.remove('active'));

  if (state === 'listening') {
    status.textContent = '正在聆听...';
    status.className = 'call__status';
    ring.style.opacity = '0';
    wave.style.opacity = '1';
    waveformMode = 'listening';
    if (micWave) micWave.style.opacity = '1';
    micMode = 'listening';
    document.getElementById('btn-listening').classList.add('active');
  } else if (state === 'thinking') {
    status.textContent = '昔涟思考中...';
    status.className = 'call__status call__status--thinking';
    ring.style.opacity = '0';
    wave.style.opacity = '1';
    waveformMode = 'thinking';
    if (micWave) micWave.style.opacity = '1';
    micMode = 'thinking';
    document.getElementById('btn-thinking').classList.add('active');
  } else if (state === 'speaking') {
    status.textContent = '昔涟说话中...';
    status.className = 'call__status';
    ring.style.opacity = '1';
    wave.style.opacity = '0';
    waveformMode = 'idle';
    if (micWave) micWave.style.opacity = '0';
    micMode = 'idle';
    document.getElementById('btn-speaking').classList.add('active');
  } else if (state === 'error') {
    status.textContent = '连接出错，请检查网络';
    status.className = 'call__status call__status--error';
    ring.style.opacity = '0';
    wave.style.opacity = '0';
    waveformMode = 'idle';
    if (micWave) micWave.style.opacity = '0';
    micMode = 'idle';
    document.getElementById('btn-error').classList.add('active');
  }
}

// 转写显示开关（只显示当前一轮）
let transcriptVisible = false;
function toggleTranscript() {
  transcriptVisible = !transcriptVisible;
  const el = document.getElementById('transcript');
  const btn = document.getElementById('btn-transcript');
  if (transcriptVisible) {
    el.hidden = false;
    btn.style.opacity = '1';
    btn.classList.add('active');
    // 模拟当前一轮内容
    renderTranscript('今天天气怎么样？', '');
  } else {
    el.hidden = true;
    btn.style.opacity = '0.6';
    btn.classList.remove('active');
  }
}

// 只渲染当前一轮（用户问 + 昔涟答），新轮覆盖旧的
function renderTranscript(userText, botText) {
  const el = document.getElementById('transcript');
  if (!transcriptVisible) return;
  el.innerHTML = '';
  if (userText) {
    const u = document.createElement('div');
    u.className = 'call__transcript-user';
    u.textContent = userText;
    el.appendChild(u);
  }
  if (botText) {
    const b = document.createElement('div');
    b.className = 'call__transcript-bot';
    b.textContent = botText;
    el.appendChild(b);
  }
}

// speaking 状态时模拟显示一轮完整对话
const _origSetState = setState;
setState = function(state) {
  _origSetState(state);
  if (transcriptVisible) {
    if (state === 'listening') {
      // 新一轮开始，清空上一轮，显示用户正在说
      renderTranscript('', '');
    } else if (state === 'thinking') {
      renderTranscript('今天天气怎么样？', '');
    } else if (state === 'speaking') {
      renderTranscript('今天天气怎么样？', '今天北京晴天，气温28度，适合出门散步哦～');
    }
  }
};

// 初始进入聆听状态
setState('listening');
</script>
</body>
</html>
