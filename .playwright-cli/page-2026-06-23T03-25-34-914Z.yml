            - listitem [ref=e461]: 「三月七」：还好，本姑娘胆大心细、足智多谋，才没落在开拓者和丹恒身后……
            - listitem [ref=e462]: 「长夜月」：以藏在相机里的形式？
            - listitem [ref=e463]: 「三月七」：那怎么啦？那也算是「开拓」！
            - listitem [ref=e464]: 「三月七」：「照相机才是我的本体」——这句玩笑话，这次不就成真了嘛？
            - listitem [ref=e465]: 「三月七」：虽然是很不方便啦：遇见危险没法出手；有人说怪话没法吐槽；看见开拓者拍烂片，我甚至都没法控制快门……
            - listitem [ref=e466]: 「三月七」：但无论如何，我还是和他们一路走到了现在——
            - listitem [ref=e467]:
              - text: 「三月七」：
              - generic [ref=e468]:
                - generic [ref=e469]: 和大家一起认识这个濒毁却美丽的世界，为逐火之旅夺得第一枚火种——
