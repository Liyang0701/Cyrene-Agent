            - listitem [ref=e475]:
              - text: 「三月七」：
              - generic [ref=e476]:
                - generic [ref=e477]: 继承大家的决心，将其带向他们为之牺牲了一切，却又无缘看见的未来——
                - generic [ref=e478]: 「建立」
            - listitem [ref=e479]:
              - text: 「三月七」：
              - generic [ref=e480]:
                - generic [ref=e481]: 直到和这个世界的命运融为一体，改写注定走向悲剧的结局，和所有人一起重返真正的星空——
                - generic [ref=e482]: 「连结」
            - listitem [ref=e483]: 「三月七」：只有这样，我才能在这场名为「翁法罗斯」的英雄之旅中……
            - listitem [ref=e484]: 「三月七」：在这场前所未有的伟大「开拓」中，也写下「三月七」的名字！
          - generic [ref=e485]:
