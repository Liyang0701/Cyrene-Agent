          - list [ref=e518]:
            - listitem [ref=e519]: 「长夜月」：我没有忘记，你第一次换上这身衣服，看向镜子的那天。
            - listitem [ref=e520]: 「长夜月」：你的眼睛很清澈。当一切过去，我希望镜子映出的，依旧是那双眼眸。
