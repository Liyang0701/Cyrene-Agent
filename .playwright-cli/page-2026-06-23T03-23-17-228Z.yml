                - text: 啊哈哈，别误会，我是老米黑头子了，除了崩2和未定，四家我都玩。原神星铁绝区零的攻略我都写，相信你能在很多wiki的页面看见我的名字。
                - text: 只是因为我喜欢的角色，在某个特定的时间段被跟风的小鬼反复掏出来烦我膈应我，而且因为大数据，还不停地把这些东西推送给我，导致我强烈的ptsd，看见同担“厨子”就开始应激。我只是一个，普通的，从她刚出现的时候，就很喜欢她的普通玩家。
                - text: 实在是无法承受有人顶着这种名字或者头像做出一些很出格的事情。
                - text: 崩三的热度和原神星铁没法比，但是乐土属实是太火，让我不得不害怕一些特定的逆天“厨子”，而且也有过好朋友被一些打着“喜欢爱莉”的名号被各种xing骚扰（那位朋友是个coser），这种时候，真的，使我非常恶心，非常膈应。简直是无法承受之重。
                - text: 只是因为知道是米哈游，所以很无奈。我知道他们很想复刻乐土的辉煌。也知道米哈游喜欢玩这些异世界同位体，多数时候，我都是狂喜的，有些角色，我真的很喜欢呀，想多看看她们，想多听听她们的声音。
                - text: 但是现在这个时代什么东西一旦火了，真的特别容易涌入一些烦人的玩意儿来恶心我。人一多，破事儿就多，我经历过很多次了。
                - text: 所以，对，我的私心是，我希望这个角色永远停留在崩三，永远只在一个地方出现。因为她太好了，我无法承受遇见更多这种打着“厨子”的名号的逆天生物带来的巨大打击。
