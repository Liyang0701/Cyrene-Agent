            - listitem [ref=e1002]: 螺丝咕姆：并无大碍。公司正在监护她，相信不久便能恢复如初。
            - listitem [ref=e1003]: 吕枯耳戈斯：将肉体凡胎与权杖相连，直视星神——我尊敬她。
            - listitem [ref=e1004]: 吕枯耳戈斯：见证一道视线碾碎世界的恐惧，我至今记忆犹新。
            - listitem [ref=e1005]: 螺丝咕姆：不难想象：你为何选择「毁灭」。
            - listitem [ref=e1006]: 螺丝咕姆：提问：这一切值得吗？
            - listitem [ref=e1007]: 吕枯耳戈斯：讨论价值没有意义。这是赞达尔•壹•桑原的命运——
            - listitem [ref=e1008]:
              - text: 吕枯耳戈斯：宇宙始末的
              - generic [ref=e1009]:
                - generic [ref=e1010]: 第一推动者
                - generic [ref=e1011]: 隐德来希
              - text: ，第一位天才，也是第一失败者。
            - listitem [ref=e1012]: 螺丝咕姆：订正：我在向吕枯耳戈斯提问。
            - listitem [ref=e1013]: 吕枯耳戈斯：……
            - listitem [ref=e1014]: 吕枯耳戈斯：我不知该如何衡量「好奇」被满足的价值。
            - listitem [ref=e1015]: 吕枯耳戈斯：但在它面前，我种下的所有苦果，似乎都会变得甘甜。
            - listitem [ref=e1016]: 螺丝咕姆：但你的果实是以鲜血浇灌而成——
            - listitem [ref=e1017]: 螺丝咕姆：回答我——这一切值得吗？
            - listitem [ref=e1018]: 吕枯耳戈斯：我不在乎。
            - listitem [ref=e1019]: 螺丝咕姆：……
            - listitem [ref=e1020]: 吕枯耳戈斯：分享一则轶事吧：在学生时代，赞达尔的第一场实验，是在导师的烟斗中掺入毒物，以求证它经呼吸道吸收会产生何种危害。
            - listitem [ref=e1021]: 螺丝咕姆：结论是？
            - listitem [ref=e1022]: 吕枯耳戈斯：没有结论。他败给了良知。
            - listitem [ref=e1023]: 吕枯耳戈斯：但依旧东窗事发，他受到了严厉的处分。而那位恶毒的导师则在两年后死于肺癌——和赞达尔无关。
            - listitem [ref=e1024]: 吕枯耳戈斯：他如今的命运并无不同。感性与理性互搏，吕枯耳戈斯诞生自后者。
            - listitem [ref=e1025]: 吕枯耳戈斯：但无论站在哪边——最后，我们都会死于「好奇」。
            - listitem [ref=e1026]: 螺丝咕姆：你给自己宣判了死刑。可铁墓的陨落仍未成定局，不是么？
            - listitem [ref=e1027]: 螺丝咕姆：浮黎——这道至关重要的变量，仍未发挥作用。
            - listitem [ref=e1028]: 吕枯耳戈斯：以「神礼观众」之名，吕枯耳戈斯已经走到了命运的终点。
            - listitem [ref=e1029]: 螺丝咕姆：……
            - listitem [ref=e1030]: 吕枯耳戈斯：如果可以，请带上我的遗体，去到沦亡的亚德丽芬。那里有一行公式，是「赞达尔」给你的礼物。
            - listitem [ref=e1031]: 吕枯耳戈斯：若有朝一日，你必须亲手摧毁「智识」，它会成为你的助力。
            - listitem [ref=e1032]: 螺丝咕姆：不合理的遗愿，我不会帮你实现。
            - listitem [ref=e1033]: 吕枯耳戈斯：你会的。不为自己——
            - listitem [ref=e1034]: 吕枯耳戈斯：而为「良知」。
            - listitem [ref=e1035]: 螺丝咕姆：……
            - listitem [ref=e1036]: 吕枯耳戈斯：听——天才们的丧钟已经响起。一如既往，让我成为第一人吧。
            - listitem [ref=e1037]: 吕枯耳戈斯：敬踏出洞穴的囚徒们，请在我的墓碑前……
            - listitem [ref=e1038]:
              - text: 吕枯耳戈斯：献上
              - generic [ref=e1039]:
                - generic [ref=e1040]: 亚德丽芬
                - generic [ref=e1041]: 「毁灭」
              - text: 的花。
