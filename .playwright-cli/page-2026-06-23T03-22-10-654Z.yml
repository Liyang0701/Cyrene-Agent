          - list [ref=e336]:
            - listitem [ref=e337]: 永夜之帷，三月七：……
            - listitem [ref=e338]: 永夜之帷，三月七：其实，开拓者，你不必独自背负这个世界的。
            - listitem [ref=e339]: 永夜之帷，三月七：自登上列车的那天起，这趟旅行就没有「一个人」的说法。所以这次，没人会在时间的尽头独自前行。
            - listitem [ref=e340]: 永夜之帷，三月七：我和丹恒特地赶来，就是为了跟你说这事。
