            - listitem [ref=e272]: 昔涟：在你来之前，我一直在想，哀丽秘榭的帷幕外，正在诞生的是一个怎样的翁法罗斯？
            - listitem [ref=e273]: 昔涟：我闭上眼睛，就能看见零星的碎片：那些与我们并肩的伙伴，已经奔向了各自的命运。
            - listitem [ref=e274]: 昔涟：有人化作世界的支柱，撑起「天空」和「海洋」；有人播撒「理性」，划定「律法」，再用双手将婴儿们轻轻捧起。
            - listitem [ref=e275]: 昔涟：「死亡」和「纷争」不再为人们所惧怕，「诡计」也成为孩子们天真的游戏。
            - listitem [ref=e276]: 昔涟：万千生灵，都在「浪漫」和「门径」的结网下度过平凡、安然的一生。
            - listitem [ref=e277]: 昔涟：没有黑潮、逐火，也没有「毁灭」。海的对面，是一个沐浴在阳光下的世界。
          - generic [ref=e279]:
            - generic [ref=e280]:
              - img "剧情选项-图标-继续.png" [ref=e282]
              - text: 是我们必须守护的世界。
            - generic [ref=e283] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e285]
              - text: 是白厄和所有人愿望中的黎明。
            - generic [ref=e286] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e288]
              - text: 世界会一直和平，直到决战来临。
          - list [ref=e289]:
            - listitem [ref=e290]: 昔涟：这一世，童年般的「黄金世」会延续千年，直到神谕中注定的瞬间——
            - listitem [ref=e291]: 昔涟：光历4931年的「自由月」，属于「负世」的时刻。
            - listitem [ref=e292]:
              - text: 昔涟：准备好迎接世人的召唤了吗，
              - generic [ref=e293]:
                - generic [ref=e294]: 开拓者
                - generic [ref=e295]: 伙伴
              - text: ？
            - listitem [ref=e296]: 昔涟：那，就去为这个无数愿望汇成的世界，落下「全世之座」的第一笔吧♪
          - separator [ref=e297]
          - list [ref=e298]:
            - listitem [ref=e299]: ？？？：话虽如此，距离光历4931年，还有好久好久呢。
            - listitem [ref=e300]: 永夜之帷，三月七：我是能利用「岁月」的夹缝，但开拓者和丹恒…不会要干等好几千年吧？
            - listitem [ref=e301]: 磐岩之脊，丹恒：倒也不必。只需安静沉睡，「识刻锚」自会将我们唤醒。
          - generic [ref=e303]:
            - generic [ref=e304]:
              - img "剧情选项-图标-继续.png" [ref=e306]
              - text: 永夜之帷，还有磐岩之脊？
            - generic [ref=e307] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e309]
              - text: 没想到，你们也在这里。
            - list [ref=e311]:
              - listitem [ref=e312]: 永夜之帷，三月七：没错。咱俩都成了新世界的一部分，现在就等你啦。
          - list [ref=e313]:
            - listitem [ref=e314]: 磐岩之脊，丹恒：似乎是受「开拓」影响，我们的意识得以跨越天地，与彼此对话。
            - listitem [ref=e315]: 磐岩之脊，丹恒：如今，我与这片「大地」相连，能感受到每一座山脉的呼吸……
            - listitem [ref=e316]: 磐岩之脊，丹恒：我看见，最高的那座名为「奥赫玛」，圣城的身影已初见雏形。
            - listitem [ref=e317]: 永夜之帷，三月七：意思是，属于你的舞台快搭好了。要不学习下刻法勒，先去发表一番神谕再入睡？
            - listitem [ref=e318]: 磐岩之脊，丹恒：不过，变化的不止有我们。
            - listitem [ref=e319]: 磐岩之脊，丹恒：就在刚才，识刻锚传来讯息：「铁墓」对「再创世」产生了反应。
            - listitem [ref=e320]:
