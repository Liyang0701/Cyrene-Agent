            - listitem [ref=e1020]: 昔涟：其实，在大家不知道的角落，还发生了一段鲜有人知的「插曲」。
            - listitem [ref=e1021]: 昔涟：我将它留在了故事之外，因为它事关一个「选择」，一个我出于私心而做的选择。
            - listitem [ref=e1022]:
              - text: 昔涟：可以原谅我吗，
              - generic [ref=e1023]:
                - generic [ref=e1024]: 开拓者
                - generic [ref=e1025]: 伙伴
              - text: 。你不在场的时候，我擅自做了一个决定……
            - listitem [ref=e1026]: 昔涟：我把关于它的一切都写在了这张小卡片上。读过以后，假如你愿意原谅我——
            - listitem [ref=e1027]: 昔涟：就把这最后一笔，添在《如我所书》的结尾吧？
          - heading "铁墓陨落后，昔涟的选择" [level=3] [ref=e1028]: 铁墓陨落后，昔涟的选择
          - blockquote [ref=e1029]:
            - paragraph [ref=e1030]: 铁墓已经被打败，但永恒之地翁法罗斯的故事还没有结束。或者说，它该迎来怎样的结局，取决于昔涟的选择……
            - generic [ref=e1031]:
              - img "图标-位置.png" [ref=e1032]
              - text: 命途狭间
          - definition [ref=e1034]: 铁墓殒落后的片刻……
          - list [ref=e1035]:
            - listitem [ref=e1036]: 昔涟：被铁墓吞没的记忆，回到现实吧。
            - listitem [ref=e1037]: 昔涟：可千万不要迷路呀♪
            - listitem [ref=e1038]: 黑塔：终于找到你了，昔涟…德谬歌。
            - listitem [ref=e1039]: 昔涟：我们赢下了这场战役呢。感谢您，黑塔女士。如果没有您，胜利根本无从谈起。
            - listitem [ref=e1040]: 昔涟：只是，还有什么后顾之忧吗？
            - listitem [ref=e1041]: 黑塔：合上眼睛前，在机器头的脑袋里，我看见了…一些令人在意的画面。
            - listitem [ref=e1042]: 黑塔：「第四时刻」——由「智识」锚定的，银河命运的转折点…它并非某个瞬间，而是一段历程，许多事件的集合。
            - listitem [ref=e1043]: 昔涟：所以，这场胜利不是那「许多事件」的最后一环？
            - listitem [ref=e1044]: 黑塔：恰恰相反，它只是开始……
            - listitem [ref=e1045]: 黑塔：是这片银河的第一声丧钟。
            - listitem [ref=e1046]: 昔涟：这幅惆怅的表情可不适合您呀，黑塔女士…别有负担，告诉我吧？
            - listitem [ref=e1047]: 黑塔：……
            - listitem [ref=e1048]:
              - text: 黑塔：不久前，你再次遇见了
              - generic [ref=e1049]:
                - generic [ref=e1050]: 「记忆」
                - generic [ref=e1051]: 浮黎
              - text: 星神，对么？
            - listitem [ref=e1052]: 昔涟：嗯。哪怕身形模糊不清，人家还是确信：那就是「昔涟」梦中的神明。
            - listitem [ref=e1053]: 黑塔：果然…「因果」出现问题了。
            - listitem [ref=e1054]: 昔涟：因果？
            - listitem [ref=e1055]: 黑塔：用你最爱的童话作比喻吧：宇宙起源于一枚种子，它长成大树，「现在」是它的枝叶。
            - listitem [ref=e1056]: 黑塔：「智识」会计算「未来」如何发芽。当然，未来有无数种发展，所以祂需要「锚定」，剪除那些长歪的、不够健壮的枝叶，只留下一种可能。
            - listitem [ref=e1057]: 黑塔：但如果只是这样，树枝越长越长，叶片越来越多，树迟早有一天会不堪重负。
            - listitem [ref=e1058]: 黑塔：所以，生物学上有种说法叫「木质化」，让嫩枝生出坚硬的表皮，与树干连为一体。
            - listitem [ref=e1059]: 黑塔：对于宇宙，这就是「记忆」的本质。
            - listitem [ref=e1060]: 黑塔：在浮黎的铭记下，「过去」凝结成「记忆」；而祂遗忘的角落，即便有「现在」发生，也会成为无根之果。
            - listitem [ref=e1061]: 昔涟：听起来，和「智识」正相反呢…一位计算未来，一位铭记过去。
            - listitem [ref=e1062]: 黑塔：原本我们不用谈论此事。但事到如今，我终于明白了包裹翁法罗斯的那团混沌物质是什么……
            - listitem [ref=e1063]: 黑塔：那是你的「记忆」。现在，你的心识遍布群星，让你在这条命途上走出了极其遥远的距离。
            - listitem [ref=e1064]: 昔涟：我的…「记忆」？
            - listitem [ref=e1065]: 黑塔：对。虽然你活在「当下」，但你的「记忆」存在于过去。
            - listitem [ref=e1066]: 黑塔：就像「记忆」的星神，也只是一簇记忆。
            - listitem [ref=e1067]: 昔涟：这是…什么意思？
            - listitem [ref=e1068]: 昔涟：祂，陨落了吗？
            - listitem [ref=e1069]: 黑塔：不。恰恰相反，是祂还未诞生。
            - listitem [ref=e1070]: 黑塔：记得么？如果要贯彻「铭记」宇宙的信念，祂只会在时间的尽头飞升成神。
            - listitem [ref=e1071]: 黑塔：而飞升的那一刻，祂的「记忆」贯穿过去，成为了人们眼中的「浮黎」。
            - listitem [ref=e1072]: 昔涟：啊……
            - listitem [ref=e1073]: 黑塔：所以祂才那么不近人情，那水晶身子只是一具空壳。我不知道忆庭怎么能把这件事瞒到现在——他们有理由这么做——但这些都不重要。
            - listitem [ref=e1074]: 黑塔：身处「当下」的我们，没法弄清是谁成为了浮黎，但能确信祂一定会诞生。
            - listitem [ref=e1075]: 黑塔：而那些可能成为浮黎的人，具备相同的特征——
            - listitem [ref=e1076]: 黑塔：她们被称作「记忆」的孩子，无漏净子。
          - separator [ref=e1077]
          - list [ref=e1078]:
            - listitem [ref=e1079]: 忆者的化身：你们都是…「记忆」的孩子……
            - listitem [ref=e1080]: 三月七？：所以，帮帮我们，找到翁法罗斯「记忆」的起点，然后把它带出来……
            - listitem [ref=e1081]: 恐惧的窃忆者：「我们。是牺牲品。忆庭。利用了我们。『无漏净子』。抛弃了我们。」
            - listitem [ref=e1082]: 昔涟：原来，这个名字背后不是人家的「过去」……
            - listitem [ref=e1083]: 昔涟：而是我的「未来」呀。
            - listitem [ref=e1084]: 黑塔：也可能，是「现在」。
            - listitem [ref=e1085]: 昔涟：……
            - listitem [ref=e1086]: 黑塔：博识尊…为我揭示了两条路。
            - listitem [ref=e1087]: 黑塔：那两条路上都站着你。
            - listitem [ref=e1088]: 黑塔：一、沿着这条你踏出的「记忆」之路，挣脱这个世界，走向群星。
            - listitem [ref=e1089]: 黑塔：这也意味着，翁法罗斯的因果与你无关，至少和现在的你无关。
            - listitem [ref=e1090]: 昔涟：……
            - listitem [ref=e1091]: 昔涟：请说下去吧。
            - listitem [ref=e1092]: 黑塔：二……
            - listitem [ref=e1093]: 黑塔：你停下脚步，以自我为代价完成「收梢」…成为贯穿翁法罗斯的「记忆」。
            - listitem [ref=e1094]: 黑塔：这或许是每一个无漏净子都要面临的抉择。
            - listitem [ref=e1095]: 昔涟：这意味着，我会永远留在「过去」。
            - listitem [ref=e1096]: 黑塔：不仅如此，你会闭合翁法罗斯的因果。这是一个封闭世界，所以「记忆」为它带来的影响，会全部收束为「你」的影响。
            - listitem [ref=e1097]: 黑塔：不会再有星神介入这段历史，也不会再有因果的「空白」，于是「现在」会被固定下来，变得坚不可摧。
            - listitem [ref=e1098]: 黑塔：两条路，只有一条是对的。机器头没有告诉我答案。
            - listitem [ref=e1099]: 黑塔：但错误的后果可以想象——因为「因果缺失」，有一定概率，铁墓会卷土重来。
            - listitem [ref=e1100]: 昔涟：……
            - listitem [ref=e1101]: 昔涟：银河里的神明，也是这么不讲道理呢。
            - listitem [ref=e1102]: 黑塔：我的建议：别想那么多，先问问自己的内心。
            - listitem [ref=e1103]:
              - text: 黑塔：选第一条路，你或许能以忆灵的形式存在下去，甚至和
              - generic [ref=e1104]:
                - generic [ref=e1105]: 他们
                - generic [ref=e1106]: 星穹列车
              - text: 同行一段时间。
            - listitem [ref=e1107]:
              - text: 黑塔：哪怕是我也看得出来，你很在意他们，尤其是
              - generic [ref=e1108]:
                - generic [ref=e1109]: 开拓者
                - generic [ref=e1110]: 那小家伙
              - text: 。
            - listitem [ref=e1111]: 黑塔：但如果选第二条路……
            - listitem [ref=e1112]: 黑塔：那你可能已经错过告别的机会了。
          - separator [ref=e1113]
          - list [ref=e1114]:
            - listitem [ref=e1115]: 昔涟：……
            - listitem [ref=e1116]: 昔涟：我想好啦，黑塔女士。
            - listitem [ref=e1117]: 黑塔：我以为你需要时间仔细斟酌。
            - listitem [ref=e1118]: 昔涟：答案显而易见，不是吗？但人家确实需要一点时间……
            - listitem [ref=e1119]: 昔涟：来克服心底的哀伤。
            - listitem [ref=e1120]: 昔涟：他/她的温柔总是恰到好处，一定…会原谅我吧？
            - listitem [ref=e1121]: 黑塔：……
            - listitem [ref=e1122]: 黑塔：我就不多说什么了，免得破坏气氛。
            - listitem [ref=e1123]: 黑塔：但最后，可以再问你一个问题吗？
            - listitem [ref=e1124]: 昔涟：当然。
            - listitem [ref=e1125]: 黑塔：为什么？
            - listitem [ref=e1126]: 昔涟：……
            - listitem [ref=e1127]: 昔涟：我听过这么一种说法：神性是「无瑕的人性」，而人性是「有瑕的神性」……
            - listitem [ref=e1128]: 昔涟：翁法罗斯的孩子，早就不相信神明啦。比起喜欢恶作剧的祂们……
            - listitem [ref=e1129]: 昔涟：我肯定更相信他/她，还有身为「人」的自己。
            - listitem [ref=e1130]: 黑塔：……
            - listitem [ref=e1131]: 黑塔：真是个…让人安心的答案。
            - listitem [ref=e1132]: 昔涟：至于我最难割舍的那份私心……
            - listitem [ref=e1133]: 昔涟：一人留在过去……
            - listitem [ref=e1134]: 昔涟：一人走向未来。
            - listitem [ref=e1135]: 昔涟：我相信，那个我最在乎的他/她……
            - listitem [ref=e1136]: 昔涟：一定会替「往昔的涟漪」见证……
            - listitem [ref=e1137]: 昔涟：每一个星星闪耀的明天♪
          - separator [ref=e1138]
          - list [ref=e1139]:
            - listitem [ref=e1140]: 昔涟：在「记忆」中逆行，真是新奇的体验呀。
            - listitem [ref=e1141]: 昔涟：这一刻，是「铁墓」宣告胜利，将「毁灭」洒向群星的瞬间？
            - listitem [ref=e1142]: 昔涟：原来，那时在命途狭间，是「我」找到了「我」。神明的耳语，竟然是少女的自言自语呀。
            - listitem [ref=e1143]: 昔涟：回想起来，当时听见的话是……
          - definition [ref=e1145]: 你我曾是不是神明人子因罪行祝福降临陨落凡间经你我之手写下抹去的诗将是曾是你我在善见天的记忆忘却。
          - list [ref=e1146]:
            - listitem [ref=e1147]: 昔涟：可我明明只是想说：「别放弃，开拓者会找到你」…「记忆」可真是奇妙呀。
            - listitem [ref=e1148]: 昔涟：那，就让人家行使这份力量……
            - listitem [ref=e1149]: 昔涟：为注定发生的「奇迹」，种下因果吧♪
          - generic [ref=e1151]:
            - generic [ref=e1152]:
              - img "剧情选项-图标-继续.png" [ref=e1154]
              - text: 播下因果的涟漪——
            - generic [ref=e1155] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e1157]
              - text: 创造「一页永恒」。
