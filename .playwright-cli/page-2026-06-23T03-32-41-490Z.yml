          - list [ref=e393]:
            - listitem [ref=e394]: 黑塔：几乎没反应，果然没那么乐观。
            - listitem [ref=e395]: 螺丝咕姆：单点输出功率仅为需求的三分之一。逻辑：需要多终端协同攻击，定位下一目标。
            - listitem [ref=e396]: 黑塔：还有什么发现？
            - listitem [ref=e397]: 螺丝咕姆：关于这片废墟的成因：我没有找到任何日志，「赞达尔」清除了所有记录。
            - listitem [ref=e398]: 螺丝咕姆：但在回路中，我发现了一些…值得注意的「伤痕」。
            - listitem [ref=e399]: 螺丝咕姆：高能辐射、虚数内能污染，以我的见识，只有一种现象与这些描述完全吻合。
            - listitem [ref=e400]: 黑塔：别提专有名词了，螺丝。那玩意只有一个名字……
            - listitem [ref=e401]: 黑塔：星核。
            - listitem [ref=e402]: 螺丝咕姆：结论成立。「赞达尔」引爆了一颗星核，只为彻底「清洗」权杖系统。
            - listitem [ref=e403]: 黑塔：所谓的「亲手扼杀」，原来是这么回事啊。
            - listitem [ref=e404]: 黑塔：为了将「智识」的神经元，改造成「毁灭」迭代的中继器，他无论如何都要将它剔除……
            - listitem [ref=e405]: 黑塔：名为「德谬歌」的生命形态，正是权杖原本的演算目标。
            - listitem [ref=e406]: 螺丝咕姆：合理的猜想。「长夜月」称其为「最初的智种」，也印证了这一观点。
            - listitem [ref=e407]: 螺丝咕姆：「生命的第一因」——这是权杖δ-me13最初负责的课题，遭到废弃后，其求解仍在进行。虽然这一问题的价值在于求解过程，而非答案本身……
            - listitem [ref=e408]: 螺丝咕姆：这是否意味着，找到德谬歌的希望已经不复存在？
            - listitem [ref=e409]: 黑塔：不，在我看来，恰恰相反。
            - listitem [ref=e410]: 黑塔：这代表「赞达尔」束手无策。他无法掌控德谬歌，就像他无法掌控机器头，只能用尽一切手段抹去它的存在。
            - listitem [ref=e411]: 黑塔：可惜，它还是留下了痕迹。
          - heading "登上「槲寄生」" [level=3] [ref=e412]: 登上「槲寄生」
          - list [ref=e413]:
            - listitem [ref=e414]: 黑塔：话说回来，既然翁法罗斯存在另一颗星核……
            - listitem [ref=e415]:
              - text: 黑塔：怎么
              - generic [ref=e416]:
                - generic [ref=e417]: 开拓者
                - generic [ref=e418]: 那小家伙
              - text: 一点反应都没有？
            - listitem [ref=e419]: 螺丝咕姆：你刚才说，德谬歌留下了痕迹。
            - listitem [ref=e420]: 黑塔：没错，但不是在现实中。还记得么——「无名泰坦大墓」？
          - heading "搜索并骇入下一座终端" [level=3] [ref=e421]: 搜索并骇入下一座终端
          - list [ref=e422]:
            - listitem [ref=e423]: 黑塔：开拓档案「4:66」——PhiLia093的经历，足以证明德谬歌进入过翁法罗斯的演算。
            - listitem [ref=e424]: 螺丝咕姆：在世界内部，它是不为人知的第十三位泰坦，也是昔涟三千万世「记忆」的倾听者。
            - listitem [ref=e425]: 螺丝咕姆：可「长夜月」给出了截然相反的说法。她认为：那座大墓从始至终都是「空房」。
            - listitem [ref=e426]: 螺丝咕姆：无名泰坦并不存在。所谓的「倾听者」，只是「记忆」为窃取权杖，设下的一场骗局。
            - listitem [ref=e427]: 黑塔：一道神神叨叨的模因，她的话能有几分真。星神会这么拐弯抹角？我不信。
            - listitem [ref=e428]: 螺丝咕姆：「记忆」的行为确有古怪，但她的观点与现状相符：自进入矩阵，我们还未发现任何和德谬歌有关的线索。
            - listitem [ref=e429]: 黑塔：你说到了重点，螺丝。「赞达尔」的举动，证明了德谬歌存在；而「长夜月」的说辞，还有现状，都反映出它不存在……
            - listitem [ref=e430]: 黑塔：我们必须假设，这两件事同时成立。如此一来，「矛盾」就会指向——
            - listitem [ref=e431]: 螺丝咕姆：真相。
            - listitem [ref=e432]: 黑塔：对。最后一座终端，也是最后一把钥匙。开启「内核层」的封印吧。
