          - list [ref=e299]:
            - listitem [ref=e300]: 黑塔：话虽如此，是我的错觉吗？这德谬歌矩阵……
            - listitem [ref=e301]: 黑塔：怎么死气沉沉的，跟那忆者的形容天差地别。
            - listitem [ref=e302]: 螺丝咕姆：环境参数严重不符。结论：这是「内核层」在现实中的样子。
            - listitem [ref=e303]: 黑塔：「赞达尔」那家伙，到底对权杖做了什么？
            - listitem [ref=e304]: 螺丝咕姆：……
            - listitem [ref=e305]: 螺丝咕姆：「光线的终点，必须是一团寂静、确凿、纯粹的黑暗」。
            - listitem [ref=e306]: 黑塔：这会儿就别引用「寂静领主」的名言了，不吉利。无论如何，我们都得继续深入……
            - listitem [ref=e307]: 黑塔：直到揪出第十三位泰坦的秘密。
            - listitem [ref=e308]: 螺丝咕姆：被掩埋的过往，正是对抗「铁墓」的关键。但前提是，它真的存在。
            - listitem [ref=e309]: 黑塔：「赞达尔」说德谬歌从未诞生——谁信？记录可以被抹除，但真相不能。
            - listitem [ref=e310]: 黑塔：它消失得太彻底了，一丝痕迹都没留下，就好像有人刻意大喊——「这里什么都没有。」
            - listitem [ref=e311]: 黑塔：可惜，本人最爱刨根问底。这次又得仰仗你了，螺丝，一起把系统翻个底朝天吧。
            - listitem [ref=e312]: 螺丝咕姆：乐意效劳。但作为学术伙伴，我必须指出——
            - listitem [ref=e313]: 螺丝咕姆：黑塔，如果我们失败了呢？
            - listitem [ref=e314]: 黑塔：……
            - listitem [ref=e315]: 螺丝咕姆：假设「德谬歌」并不存在，你是否准备了预案？
            - listitem [ref=e316]: 黑塔：备用方案？当然有。如果实在找不着钥匙……
            - listitem [ref=e317]: 黑塔：就让「锁」来当钥匙吧。
            - listitem [ref=e318]: 螺丝咕姆：该方案的损耗…无法计算。它不该被列为选项。
            - listitem [ref=e319]: 黑塔：那就祈祷我们用不上吧。
            - listitem [ref=e320]: 黑塔：别聊那么远的话题，凡事都得一步一步来。走了，别让外面的人等太久。
          - heading "操作「扎格列斯之手」，清除障碍" [level=3] [ref=e321]: 操作「扎格列斯之手」，清除障碍
          - list [ref=e322]:
            - listitem [ref=e323]: 黑塔：拜托你的东西，带来了吗？
            - listitem [ref=e324]: 螺丝咕姆：「蝴蝶若想飞舞，须先落在枝头。」
            - listitem [ref=e325]: 螺丝咕姆：在「她」登场前，需要一处空旷的平台。
          - separator [ref=e326]
          - list [ref=e327]:
            - listitem [ref=e328]: 黑塔：就用边上那玩意吧，扎格、扎……
          - heading "使用冲拳，击碎平台上的障碍块" [level=3] [ref=e329]: 使用冲拳，击碎平台上的障碍块
          - list [ref=e330]:
            - listitem [ref=e331]: 黑塔：什么破名字。我宣布——它现在改叫「黑塔的大手」！
          - separator [ref=e332]
          - list [ref=e333]:
            - listitem [ref=e334]: 黑塔：黑塔的大手，真是强而有力啊！继续。
            - listitem [ref=e335]: 黑塔：还没完？智械哥是把这当垃圾场了吗？
            - listitem [ref=e336]: 黑塔：终于搞定了。让你的宝贝亮相吧。
            - listitem [ref=e337]: 螺丝咕姆：当然。请借我些时间……
          - heading "登上「槲寄生」" [level=3] [ref=e338]: 登上「槲寄生」
          - blockquote [ref=e339]:
            - paragraph [ref=e340]: 螺丝咕姆的宝贝看起来不错，希望它在探索矩阵上同样有效。
            - generic [ref=e341]:
              - img "图标-位置.png" [ref=e342]
              - text: 翁法罗斯-「灾梦余温」无名泰坦大墓
          - list [ref=e343]:
            - listitem [ref=e344]: 螺丝咕姆：对象声明完成。若有这对机翼协助，骇入会更加高效。
          - separator [ref=e345]
          - list [ref=e346]:
            - listitem [ref=e347]: 黑塔：喔，是老式核热引擎？很有品味嘛。
            - listitem [ref=e348]: 螺丝咕姆：只是个人爱好。她的名字是「槲寄生」。
            - listitem [ref=e349]: 黑塔：你的花园怎么都带点毒？
            - listitem [ref=e350]: 螺丝咕姆：同样是个人爱好。
            - listitem [ref=e351]: 黑塔：它让我想起上一回，咱们跟那朋克洛德小鬼交手的时候。她管这种渗透工具叫什么来着…喔，脏数据壳。用来包裹住核心，骗过最顶级的防火墙。
            - listitem [ref=e352]: 黑塔：不过，你这个太干净了，一点烟火气都没有。
            - listitem [ref=e353]: 螺丝咕姆：黑塔，你的语气有非典型波动。
            - listitem [ref=e354]: 螺丝咕姆：提议：我们应当继续刚才的话题。
            - listitem [ref=e355]: 黑塔：我以为那个话题早过去了。
            - listitem [ref=e356]: 螺丝咕姆：现状不允许我忽视任何变量，尤其是最关键的那一道：你的意志。
            - listitem [ref=e357]: 螺丝咕姆：「铁墓」的自我迭代不会停止，其进化速度已超过最坏预期。
            - listitem [ref=e358]: 螺丝咕姆：星神计算中的时刻，就像一柄悬在银河头顶的利剑。人们做出的每一步抉择，都可能加速它的到来。
            - listitem [ref=e359]: 黑塔：所以，我们更不能失手。
            - listitem [ref=e360]: 黑塔：机器头又要给可怜的银河下判决了：边星贸易战争、帝皇战争、鲁珀特之死，每一次祂的时刻应验，都意味着人类要经历一场血洗。
            - listitem [ref=e361]: 螺丝咕姆：但在「智识」的终极博弈里，你我应当成为棋手，而不是棋子。
            - listitem [ref=e362]: 螺丝咕姆：一旦你选择将自己用作「耗材」，那我们所做的一切，将失去意义。
            - listitem [ref=e363]: 螺丝咕姆：黑塔，你该明白：银河不会坐视一位天才牺牲自己——
            - listitem [ref=e364]: 螺丝咕姆：我亦不例外。
            - listitem [ref=e365]: 黑塔：别说这种扫兴话。所以我们才要过来，不是么？找到「德谬歌」，那把丢失的钥匙。
            - listitem [ref=e366]: 黑塔：我可没兴趣当「救世主」。我只想赢——赢过「赞达尔」，还有机器头。
            - listitem [ref=e367]: 黑塔：现在——我只关心，你愿意站在我这边么？
            - listitem [ref=e368]: 螺丝咕姆：……
            - listitem [ref=e369]: 螺丝咕姆：当然。该登机了，你先请。
            - listitem [ref=e370]: 黑塔：让我们把这地方收拾干净，看看「德谬歌」到底是何方神圣。
          - heading "启动「槲寄生」" [level=3] [ref=e371]: 启动「槲寄生」
          - heading "驾驶「槲寄生」深入矩阵" [level=3] [ref=e372]: 驾驶「槲寄生」深入矩阵
          - list [ref=e373]:
            - listitem [ref=e374]: 黑塔：但愿这矩阵能比帝皇出生的废料场整齐点。
            - listitem [ref=e375]: 黑塔：准备好，要骇入了——
            - listitem [ref=e376]: 黑塔：这……
            - listitem [ref=e377]: 螺丝咕姆：黑塔，这片空间…被某种能量彻底污染过。
            - listitem [ref=e378]: 黑塔：我知道。我们在想同一件事。
            - listitem [ref=e379]: 黑塔：赞达尔，你对自己造的「坟场」…真下得去手啊。
            - listitem [ref=e380]: 黑塔：前面那是？
            - listitem [ref=e381]: 螺丝咕姆：十四行代数式屏障。用于「隔离」，而非防御。
