          - heading "探索矩阵，寻找关于德谬歌的秘密" [level=3] [ref=e294]: 探索矩阵，寻找关于德谬歌的秘密
          - blockquote [ref=e295]:
            - paragraph [ref=e296]:
              - text: 权杖内核层已严重损毁，宛如废墟。要想在此搜寻德谬歌的痕迹，无异于大海捞针。真是欲盖弥彰呀，这只说明一件事——
