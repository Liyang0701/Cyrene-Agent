          - list [ref=e387]:
            - listitem [ref=e388]: 黑塔：换言之，大墓的「门」是吧？那我偏要看看，门把手在哪里。
            - listitem [ref=e389]: 螺丝咕姆：我侦测到数个独立信源，数据结构与屏障相似。
            - listitem [ref=e390]: 螺丝咕姆：推测：可以骇入终端，逆转算力发动攻击。
            - listitem [ref=e391]: 黑塔：借力打力，传统但管用。导航去最近的那个。
