            - listitem [ref=e409]: 往昔的涟漪：还记得吗？灰白的黎明，刺破长夜的瞬间……
            - listitem [ref=e410]: 往昔的涟漪：「纷争」的长矛险些夺走了开拓者的生命——
            - listitem [ref=e411]: 往昔的涟漪：是你——「冒充」神明的你——用温柔的目光托起他/她的形体。
            - listitem [ref=e412]: 往昔的涟漪：然后，在欧洛尼斯的祭坛前……
            - listitem [ref=e413]: 欧洛尼斯：多么绚烂的记忆……
