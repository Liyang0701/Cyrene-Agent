          - list [ref=e464]:
            - listitem [ref=e465]: 昔涟：咳……
            - listitem [ref=e466]: 往昔的涟漪：还好吗？
            - listitem [ref=e467]: 昔涟：没事啦。人家只是…走得有点累啦。
            - listitem [ref=e468]: 往昔的涟漪：嘻，要多运动呀。
          - separator [ref=e469]
          - list [ref=e470]:
            - listitem [ref=e471]: 记忆中的姬子：「三重命途交织缠绕着翁法罗斯，共同谱写世界的命运」——按照你的说法，普通的命途行者不会在镜中留下痕迹，所以……
            - listitem [ref=e472]: 记忆中的姬子：在这遗世独立的星系，诞生过至少三位堪比「令使」的存在。
            - listitem [ref=e473]: 记忆中的黑天鹅：甚至，可能是星神本人垂迹。
            - listitem [ref=e474]: 往昔的涟漪：为了让翁法罗斯被群星眷顾，「记忆」向银河求援。
            - listitem [ref=e475]: 往昔的涟漪：可惜，权杖的阻力太过强大：即便「神明」，也只能向同路人送去一道转瞬即逝的模因……
            - listitem [ref=e476]: 昔涟：好在，黑天鹅小姐捉住了那一瞬呀。
