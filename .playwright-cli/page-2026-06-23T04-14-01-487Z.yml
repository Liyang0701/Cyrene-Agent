          - heading "从永恒的一页出发，走上回望过去的路" [level=3] [ref=e376]: 从永恒的一页出发，走上回望过去的路
          - blockquote [ref=e377]:
            - paragraph [ref=e378]: 倘若世间因果是一条顺流而下的溪涧，那么少女就是被岁月之风吹起、溯流而上的花朵。沿着回望的方向，她踮着脚在水面上播撒着涟漪，圆满了因果、拂留了芬芳，将一切重要的瞬间铭刻于此，慢慢地靠近…那最初的起点。
            - generic [ref=e379]:
              - img "图标-位置.png" [ref=e380]
              - text: 翁法罗斯-「岁月彼岸」一页永恒
          - list [ref=e381]:
            - listitem [ref=e382]: 昔涟：话虽如此，要一直走到「记忆」的起点吗？
            - listitem [ref=e383]: 昔涟：这么远的路，一个人多少有些寂寞呀。
            - listitem [ref=e384]: 往昔的涟漪：那，介意多一个人和你同行吗？
            - listitem [ref=e385]: 昔涟：……
            - listitem [ref=e386]: 昔涟：如果是桃子，多三千万个都不介意哦？
            - listitem [ref=e387]: 往昔的涟漪：一个就够啦。
            - listitem [ref=e388]: 往昔的涟漪：收拾好心情，我们准备出发吧？
            - listitem [ref=e389]: 往昔的涟漪：沿着「记忆的涟漪」走向过去，将那些「神明显灵」的时刻一一串联起来。
            - listitem [ref=e390]: 昔涟：明明是「因」促成了「果」。
            - listitem [ref=e391]: 昔涟：但现在，却是「未来」赋予了「过去」新的意义，「果」反过来滋养了「因」……
            - listitem [ref=e392]: 往昔的涟漪：也许，这就是「记忆」的美妙之处啦♪
          - heading "播下涟漪，进行第一次回望" [level=3] [ref=e393]: 播下涟漪，进行第一次回望
          - list [ref=e394]:
