            - listitem [ref=e503]: 昔涟：也很费力气呀。
          - separator [ref=e504]
          - list [ref=e505]:
            - listitem [ref=e506]: 记忆中的昔涟：你要握紧这柄仪式剑。在我离去后，它会把你送回时间的起点，一段新故事的开篇。
            - listitem [ref=e507]: 记忆中的昔涟：我相信，在那段故事里，又或者无数段相似而不相同的故事之后，大家…所有牺牲的伙伴，都能和我们儿时憧憬的「救世主」一起，在更辽阔的星空下相聚。
            - listitem [ref=e508]: 记忆中的白厄：…倘若我们终究无法冲破这座囚笼，我会坚守。直到有人前来打破这漫长的轮回，为翁法罗斯的命运添上结尾。
            - listitem [ref=e509]: 往昔的涟漪：一眨眼的功夫，回到命运的转折点啦。
            - listitem [ref=e510]: 往昔的涟漪：借着一丝缥缈的希望，我们拥抱三千万世徒劳，开启了「永劫回归」。
