            - listitem [ref=e765]: 昔涟：「毕竟，我们总是心有灵犀呀♪」
          - separator [ref=e766]
          - list [ref=e767]:
            - listitem [ref=e768]: 三月七：「…喂喂，别写得那么急啦！」
            - listitem [ref=e769]: 丹恒：「慢下来，让文字得到沉淀吧。」
            - listitem [ref=e770]: 丹恒：「我们有很多时间。」
            - listitem [ref=e771]: 开拓者：「…嗯。」
            - listitem [ref=e772]:
              - text: 开拓者：…翁法罗斯的
              - generic [ref=e773]:
                - generic [ref=e774]: 哀悼月
                - generic [ref=e775]: 十一月
              - text: ，大地上的所有争斗都会止息；哀悼月的第十一个日夜，逝者将离别，生者将相拥，雪花将落下，篝火将升起，照亮每一颗哀怜的心。
            - listitem [ref=e776]: 开拓者：听上去很沉重，对吗？但在这一天，欢笑却远比哭声更响亮。
            - listitem [ref=e777]: 开拓者：因为人们明白，道别是为了下一次相遇，哀伤是为了更好地去爱。所以，这是她一年当中最喜欢的一天。
            - listitem [ref=e778]: 开拓者：在同一片天空下，八次月相盈亏，十三位英雄共同谱写下史诗——
            - listitem [ref=e779]: 开拓者：一，加上八，再加上十三，得出的数字是两个「十一」。
            - listitem [ref=e780]: 三月七：「接下来的内容，以昔涟小姐的口吻来写，质感会不会更好？」
            - listitem [ref=e781]: 丹恒：「同意。」
            - listitem [ref=e782]: 「另一位作者♪」：然后，要再加上「一」——不同以往的「一」，向前开拓的「一」♪
            - listitem [ref=e783]: 「另一位作者♪」：我许下心愿，在十一月的第十二天，十三位英雄，会将三千万次生命中点燃的每一颗火种，泼洒在群星间……
            - listitem [ref=e784]: 「另一位作者♪」：而后，知晓这个故事的人们，望向银河时会惊讶地发现：漫天繁星被镀上了粉色，而十三秒后，这一抹明媚的光芒就会悄悄褪去。
            - listitem [ref=e785]: 「另一位作者♪」：这是多么浪漫，却又令人疑惑的景象呀。
            - listitem [ref=e786]: 「另一位作者♪」：可是没关系。他们将会将这份疑惑留存于心底，不断地去思索……
            - listitem [ref=e787]: 「另一位作者♪」：思索何为「真我」。
            - listitem [ref=e788]: 「另一位作者♪」：他们将会去爱，将会受伤……
            - listitem [ref=e789]: 「另一位作者♪」：他们将会愤怒，将会在三千万次无可奈何中，一遍又一遍地缝补支离破碎的心。
            - listitem [ref=e790]: 「另一位作者♪」：可是，千万别忘记：逐火是不断失却的旅途。或许痛苦会有许多，但你我从未孤独。
            - listitem [ref=e791]: 「另一位作者♪」：他们将会懂得失却，最终…选择失却。
            - listitem [ref=e792]: 「另一位作者♪」：他们将为这世界，为同行的每一位伙伴，献出自己的心，接过他人的心，并将其传递下去。
            - listitem [ref=e793]: 「另一位作者♪」：这世界存在多少颗心灵，便有多少种「真我」，多少种「生命的第一因」，它永远不会得到唯一的答案——就连「爱」也不是。
            - listitem [ref=e794]: 「另一位作者♪」：但是啊。当人们看向夜空，去以赞美星星的决心，爱着正在消逝的一切时——我希望用那温柔的粉色告诉他们，「爱」总会得到回应。
            - listitem [ref=e795]: 「另一位作者♪」：这是一个讲述「爱」的故事，也是讲述如何回应「爱」的故事。
            - listitem [ref=e796]: 「另一位作者♪」：而无论是我们已经写成的，还是你将在未来写下的……
            - listitem [ref=e797]: 「另一位作者♪」：都注定是一个不同以往的浪漫故事。
            - listitem [ref=e798]: 「另一位作者♪」：你也是这么想的，对吧♪
            - listitem [ref=e799]: 开拓者：而一个浪漫的故事，应当有一个圆满，又天马行空的结局。
            - listitem [ref=e800]: 开拓者：当线索和脉络都已收束，下笔的轻重不再受制约时……
            - listitem [ref=e801]: 开拓者：就尽情挥洒「开拓」的信念，以最纯粹的烂漫画上「。」吧！
