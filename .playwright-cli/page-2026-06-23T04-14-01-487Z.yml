            - listitem [ref=e443]: 记忆中的三月七：可恶，这些怪物…到底是什么来头？！
            - listitem [ref=e444]: 记忆中的三月七：别想打倒本姑娘！在找到帮助开拓者跟丹恒的办法前…咱绝对不会倒下！
            - listitem [ref=e445]: 记忆中的三月七：有什么不满，都跟六相冰说去吧！
            - listitem [ref=e446]: 往昔的涟漪：整整97天，三月走遍了翁法罗斯，只为找到拯救伙伴的方法。
            - listitem [ref=e447]: 往昔的涟漪：她以手中的弓箭，狠狠教训了拦路的家伙们——
