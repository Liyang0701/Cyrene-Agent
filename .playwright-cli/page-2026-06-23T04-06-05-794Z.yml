            - listitem [ref=e599]: 全世之座，开拓者：……
            - listitem [ref=e600]: 星期日：以神之名，行凡人之道。还是以凡人之躯，承神之重负……
            - listitem [ref=e601]: 姬子：他/她会给出答案的。
            - listitem [ref=e602]: 全世之座，开拓者：……
