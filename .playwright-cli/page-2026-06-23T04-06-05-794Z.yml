          - heading "深入翁法罗斯，探索世界内部的样貌" [level=3] [ref=e520]: 深入翁法罗斯，探索世界内部的样貌
          - list [ref=e521]:
            - listitem [ref=e522]: 瓦尔特：不知道开拓者他们，如今身在何方？
          - separator [ref=e523]
          - list [ref=e524]:
            - listitem [ref=e525]: 姬子：……
            - listitem [ref=e526]: 瓦尔特：为何…一个人都没有？
            - listitem [ref=e527]: 姬子：奥赫玛一切如常，证明「新世界」不久前，还在享受和平的时光。
            - listitem [ref=e528]: 星期日：恐怕不止「不久前」，姬子小姐。
            - listitem [ref=e529]: 黑天鹅：桌上的果盘是新切的，浴池的水温也恰到好处。「记忆」告诉我，这里刚刚还人声鼎沸……
            - listitem [ref=e530]: 黑天鹅：仿佛只在一瞬间，所有人都消失了。
            - listitem [ref=e531]: 姬子：难道，是「赞达尔」？
            - listitem [ref=e532]: 瓦尔特：不应该，他还在两位天才的监控之下。
            - listitem [ref=e533]: 瓦尔特：会是当地的某种习俗吗？
            - listitem [ref=e534]: 星期日：习俗…会让整座城市在一瞬间静默么？
            - listitem [ref=e535]: 星期日：恕我直言，瓦尔特先生，这让我想起一些「同谐」的负面传闻。万籁俱寂……
            - listitem [ref=e536]: ？？？：往往是神明垂迹的序曲。
            - listitem [ref=e537]: 星期日：…各位，小心。
            - listitem [ref=e538]: ？？？：来了，来了。星穹列车的无名客。
            - listitem [ref=e539]: 黑天鹅：「长夜月」？怎么会，她明明已经……
            - listitem [ref=e540]: ？？？：我们是「岁月」的记录者，我们不会消失。
            - listitem [ref=e541]: ？？？：终于，最后的「再创世」完成了。
            - listitem [ref=e542]: 星期日：消失的圣城居民，还有三位无名客…你对他们做了什么？
            - listitem [ref=e543]: ？？？：我什么也不用做。「记忆」终将化作新世界的质料。
            - listitem [ref=e544]: ？？？：如今，他们不再是你们熟知的开拓者，而是遍入天地的神明……
            - listitem [ref=e545]: ？？？：守卫翁法罗斯的十二泰坦。
            - listitem [ref=e546]: 姬子：……
            - listitem [ref=e547]: 姬子：别闹了，三月。快出来吧。
            - listitem [ref=e548]: ？？？：……
            - listitem [ref=e549]: 永夜之帷，三月七：「哎呀，我可是练习了好久……」
            - listitem [ref=e550]: 永夜之帷，三月七：「一眼就被识破，也太没面子啦。」
            - listitem [ref=e551]: 瓦尔特：显然，你在翁法罗斯受了许多戏剧文化的熏陶。
            - listitem [ref=e552]: 姬子：但如果可以，我更希望我们的重逢…更轻松日常一些。
            - listitem [ref=e553]: 永夜之帷，三月七：「果然，完全瞒不过姬子和杨叔呢。」
            - listitem [ref=e554]: 永夜之帷，三月七：「好久不见，我…回来啦？」
            - listitem [ref=e555]: 姬子：这话应该由我们说才对。抱歉…让你们久等了。
            - listitem [ref=e556]: 姬子：所以这些水母，是泰坦的力量？
            - listitem [ref=e557]: 永夜之帷，三月七：「只是『永夜之帷』的小小分身，用来侦察和联络的！如果我使出全力，能召唤的数量可要多得多。」
            - listitem [ref=e558]: 永夜之帷，三月七：「都赖开拓者，我们在新世界全变成了泰坦的模样。虽说可以化作人形，但总归觉得怪怪的。」
            - listitem [ref=e559]: 瓦尔特：还真是…令人期待。那，开拓者变成了什么样子？
            - listitem [ref=e560]: 姬子：总不能是手持球棒的小浣熊吧？
            - listitem [ref=e561]: 永夜之帷，三月七：「别再给翁法罗斯的世界观加怪东西啦！眼见为实，跟上神谕的指引，来黎明云崖吧——」
            - listitem [ref=e562]: 永夜之帷，三月七：「他/她现在的样子，可比以前伟岸多啦。」
          - heading "跟随神谕的号召，前往黎明云崖" [level=3] [ref=e563]: 跟随神谕的号召，前往黎明云崖
          - blockquote [ref=e564]:
            - paragraph [ref=e565]: 翁法罗斯与外界的隔绝状态被打破，三位无名客先行者成为新世界的泰坦。圣城居民向「负世」的开拓者祈祷，虔诚等待全世的神谕降临。
            - generic [ref=e566]:
              - img "图标-位置.png" [ref=e567]
              - text: 翁法罗斯-「半神议院」黎明云崖
          - list [ref=e568]:
            - listitem [ref=e569]: 瓦尔特：难以置信。整座圣城的居民都聚集在这里。
            - listitem [ref=e570]: 星期日：这不是集会，而是一场朝圣。人们的神情坚定、虔诚…仿佛在等候一场奇迹降临。
            - listitem [ref=e571]: 黑天鹅：那尊巨神…是开拓者。他/她成为了世界的支柱。
            - listitem [ref=e572]: 姬子：意外地原汁原味呢，这么认真，可不像平时的他/她啊。
            - listitem [ref=e573]: 永夜之帷，三月七：「人们并非消失不见，而是听到了神谕的号召，前来见证开拓者的苏醒。」
            - listitem [ref=e574]: 永夜之帷，三月七：「那家伙背负着整个世界，每一次呼吸都与翁法罗斯的命运相连。」
            - listitem [ref=e575]: 星期日：苏醒？开拓者陷入沉睡了么？
            - listitem [ref=e576]: 永夜之帷，三月七：「当然。毕竟权杖内外的时间流速差那么大，我们只能通过这种方式等候大家呀。」
            - listitem [ref=e577]: 永夜之帷，三月七：「由『岁月』守望昨天，由『大地』拱卫今天，直到『开拓』再度踏入翁法罗斯，沉睡的『救世主』便会苏醒……」
            - listitem [ref=e578]: 永夜之帷，三月七：「然后，为世界带来『明天』的预言。」
            - listitem [ref=e579]: 永夜之帷，三月七：「走吧，大家？到离他/她更近的地方去。」
            - listitem [ref=e580]: 永夜之帷，三月七：「看『负世』的神谕，是如何改变这个世界！」
            - listitem [ref=e581]: 瓦尔特：这一站，孩子们已经远远走在了大人前面了啊。
            - listitem [ref=e582]: 姬子：那我们就更不能停下脚步了。上前见证这一刻吧。
          - heading "前往半神议会，见证开拓者的苏醒" [level=3] [ref=e583]: 前往半神议会，见证开拓者的苏醒
