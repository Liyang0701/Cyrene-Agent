          - list [ref=e477]:
            - listitem [ref=e478]: 符玄：姬子小姐，好消息。七天将重新对现状做了讨论，并由我代为传达：名义上，联盟仍将会战战力限制在罗浮一舰，但曜青也已部署在周围战区，以备不时之需。
            - listitem [ref=e479]: 姬子：大恩不言谢。这次「巡猎」同意出兵，景元将军想必费了不少心思。
            - listitem [ref=e480]: 符玄：罗浮已将列车视作重要盟友，我们也无意隐瞒，「铁墓」一役，确有仙舟所求之物。
            - listitem [ref=e481]: 符玄：但此番出兵，乃是元帅亲自裁夺：大敌当前，联盟没有退缩的理由，也不会甘居人后。
            - listitem [ref=e482]: 符玄：若能与寰宇众多文明同舟共济，共克时艰，我们必当舍命不渝。
            - listitem [ref=e483]: 姬子：联盟大义。银河能有各位英雄豪杰，实在是一件幸事。
            - listitem [ref=e484]: 符玄：过奖了。至于那枚结盟玉兆，你们可以留到更紧迫的时候再用。
