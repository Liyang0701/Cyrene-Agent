            - listitem [ref=e460]: 布洛妮娅：当然。我们已经将绝大部分造物引擎重新封入冰下，以防「存护」之志成为「毁灭」的帮凶。
            - listitem [ref=e461]: 托帕：放心，姬子小姐，贝洛伯格远比我们想象中更坚韧。
            - listitem [ref=e462]: 希露瓦：我们真的很希望能帮上忙…可惜，雅利洛-Ⅵ也只是刚从冬眠中苏醒的冰原熊而已。
            - listitem [ref=e463]: 希露瓦：站在灾难最前方的星穹列车，才是众多宇宙平凡文明的希望哪。
            - listitem [ref=e464]: 布洛妮娅：在如此宏观的灾难面前，相对弱小的文明…一向没有更多选择。
            - listitem [ref=e465]: 希儿：……
            - listitem [ref=e466]: 布洛妮娅：但也正因如此，我们才有不输给任何人的决心。
            - listitem [ref=e467]: 姬子：如有不测…还请托帕小姐能够帮忙，救援受灾民众。
            - listitem [ref=e468]: 托帕：没问题。先前仙舟不是和雅利洛-VI签订了友好协议吗？他们也不会袖手旁观。
            - listitem [ref=e469]: 布洛妮娅：……
            - listitem [ref=e470]: 布洛妮娅：各位的好意，我心领了。但雅利洛-VI是我们的家。我们会誓死坚守，直到最后一个贝洛伯格人倒下。
            - listitem [ref=e471]: 姬子：布洛妮娅小姐……
            - listitem [ref=e472]: 姬子：愿寰宇中所有自立走到今天的文明，能够一起度过这次难关。
