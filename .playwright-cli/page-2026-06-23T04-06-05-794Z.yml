          - heading "剧情内容" [level=2] [ref=e309]:
            - generic [ref=e310]: 剧情内容
          - alert [ref=e311]:
            - text: 正在切换至【姬子】视角…
            - text: 星穹列车的诸位准备进入翁法罗斯……
          - definition [ref=e313]: 现在，天外……
          - heading "协商出战事宜，支援星穹列车" [level=3] [ref=e314]: 协商出战事宜，支援星穹列车
          - blockquote [ref=e315]:
            - paragraph [ref=e316]: 仙舟盟誓：「欲令后世免于侵凌攻伐、危疑苛暴之衅」。此番请缨出战，但为扫除仇寇，援联盟友，佑护银河众生。
            - generic [ref=e317]:
              - img "图标-位置.png" [ref=e318]
              - text: 仙舟「罗浮」-神策府
          - list [ref=e319]:
            - listitem [ref=e320]: 景元：审讯卷宗已经上呈元帅。依照十王律令，镜流与罗刹，当继续押往「虚陵」。
            - listitem [ref=e321]: 景元：但天击将军迟迟不愿中断通讯，是出于叙旧之心……
            - listitem [ref=e322]: 景元：还是腹中有话，不吐不快呢？
            - listitem [ref=e323]: 飞霄：真沉得住气啊，景元。对铁墓一役，联盟只准许罗浮一舰出兵……
            - listitem [ref=e324]:
              - text: 飞霄：都说
              - generic [ref=e325]:
                - generic [ref=e326]: 戎韬将军
                - generic [ref=e327]: 爻光
              - text: 智光昭昭。这会儿怎么看不清局势了？
            - listitem [ref=e328]: 爻光：瞧你说的，我也没投反对票呀。
            - listitem [ref=e329]: 爻光：可大敌环伺，小孩都知道元帅要留几艘仙舟在后方，以备不时之需。
            - listitem [ref=e330]: 爻光：谁先请缨，谁就是元帅的选择。我看——这结果正中景元下怀呢。
            - listitem [ref=e331]: 飞霄：别怪我说话难听：这一战，绝不能让罗浮领衔。
            - listitem [ref=e332]: 景元：天击将军，莫不是怕罗浮摘了曜青战功？
            - listitem [ref=e333]: 飞霄：兹事体大，就别打趣了。星核之乱、演武仪典…乱象虽平，坊间流言蜚语可是有增无减。
            - listitem [ref=e334]: 飞霄：有炎老在，别有用心之徒掀不起风浪。可一旦罗浮夺来金血，事态就大为不同了。
            - listitem [ref=e335]: 飞霄：镜流是何许人也，与你又有何渊源…不必我多说。借题发挥的法子，要多少有多少。
            - listitem [ref=e336]: 景元：飞霄将军多虑。我此番请缨，本就不求联盟内众口同声。
            - listitem [ref=e337]: 景元：罗浮斩获金血，戴罪立功，此为一胜；你我恃此金血，因便斡旋，此为二胜；罗浮二胜，我三人皆大欢喜，此为三胜——
            - listitem [ref=e338]: 景元：瞧，这要是天舶司的买卖，不是赚得盆满钵满么？
            - listitem [ref=e339]: 爻光：我看「神策将军」改名叫「乐观将军」得了。
            - listitem [ref=e340]: 景元：玉阙有「十方光映法界」傍身，定比罗浮更明白此战的意义。
            - listitem [ref=e341]: 景元：翁法罗斯的因果从穷观阵中消失了——在爻光将军看来，这一异象主何吉凶？
            - listitem [ref=e342]: 爻光：卜筮学中，我们称之为「虚贞」：事涉星神，非凡人可窥全貌。
            - listitem [ref=e343]: 景元：您这解释也不比符卿说得好懂。
            - listitem [ref=e344]: 爻光：哎呀，「测不准」三个字，到底哪里不好懂了？
            - listitem [ref=e345]:
              - text: 爻光：对于
              - generic [ref=e346]:
                - generic [ref=e347]: 青金脑袋
                - generic [ref=e348]: 博识尊
              - text: ，「铁墓」出世是计算中的时刻，但我相信祂不会坐以待毙。
            - listitem [ref=e349]: 爻光：而对于银河势力，这是「一线生机」，也是扭转星际形势的关键。星穹列车牵头组建联军，但我看各方派系都暗藏小九九呢。
            - listitem [ref=e350]: 飞霄：联盟内部都有分歧，不难想象其余势力会如何。
            - listitem [ref=e351]: 飞霄：景元。赛杜尼拉默星群一战，我和星啸的军团交过手了。
            - listitem [ref=e352]: 飞霄：务必小心。论军备、兵卒，烬灭军团不值一提，公司，甚至丰饶民都能与之一战。但虚卒不过是「毁灭」的耗材，真正的变数——
            - listitem [ref=e353]: 景元：是「绝灭大君」。
            - listitem [ref=e354]: 飞霄：没错。纳努克的令使，也是祂燃烧命途的兵器。寻常的兵法、韬略，恐怕对他们不起作用。
            - listitem [ref=e355]: 飞霄：这是我的判断——要彻底击落一名大君，必须不计伤亡，不惜代价，只怕……
            - listitem [ref=e356]: 飞霄：只怕稍有不慎，罗浮又会落入幻胧的陷阱，离「毁灭」越来越近。
            - listitem [ref=e357]: 景元：可「疑虑」二字，正是她意图在你我心中留下的心魔。
            - listitem [ref=e358]: 景元：还记得么？联盟誓言的开篇：「欲令后世免于侵凌攻伐、危疑苛暴之衅」。
            - listitem [ref=e359]: 景元：帝弓的锋镝，从来指向一切威胁寰宇的灾祸。既然「开拓」道与我同，那云骑也当守誓如初……
            - listitem [ref=e360]:
              - text: 景元：但愿战线最前方的
              - generic [ref=e361]:
                - generic [ref=e362]: 他们
                - generic [ref=e363]: 星穹列车
              - text: ，也能够平安哪。
          - heading "进入翁法罗斯，从世界内部定位「铁墓」" [level=3] [ref=e364]: 进入翁法罗斯，从世界内部定位「铁墓」
          - blockquote [ref=e365]:
            - paragraph [ref=e366]: 按照黑塔制定的作战计划，列车组众人将深入翁法罗斯内部，与银河联军里应外合，共同击败「铁墓」。
            - generic [ref=e367]:
              - img "图标-位置.png" [ref=e368]
              - text: 星穹列车-观景车厢
          - list [ref=e369]:
            - listitem [ref=e370]: 黑天鹅：「识刻锚」传来了信号…各位，该动身了。
            - listitem [ref=e371]: 瓦尔特：开拓者他们，成功了吗？
            - listitem [ref=e372]:
              - text: 黑塔：保险起见，我再重复一遍计划：你们要进入翁法罗斯，与
              - generic [ref=e373]:
                - generic [ref=e374]: 失散的三兄妹
                - generic [ref=e375]: 开拓者、三月七、丹恒
              - text: 汇合，设法从世界内部定位「铁墓」。
            - listitem [ref=e376]: 黑塔：准备带谁？
            - listitem [ref=e377]: 瓦尔特：这一战事关寰宇，容不得任何闪失。我建议——除帕姆外——全员出动。
            - listitem [ref=e378]: 黑天鹅：需要应对一切可能的变数，我没有异议。
            - listitem [ref=e379]: 星期日：愿尽绵薄之力。
            - listitem [ref=e380]: 黑塔：与此同时，我和螺丝会继续从外部攻击德谬歌矩阵，也就是权杖的内核层。
            - listitem [ref=e381]: 黑塔：咱们双管齐下，一定能让这台铁疙瘩彻底报废。现在——就等那俩人回来了。
            - listitem [ref=e382]: 黑塔：喔，人这不就到齐了？
            - listitem [ref=e383]: 姬子：久等了。在螺丝星的帮助下，组建银河联军共御「铁墓」一事，推进得很顺利。
            - listitem [ref=e384]: 螺丝咕姆：银河已将目光投向翁法罗斯，只待…一声枪响。
            - listitem [ref=e385]: 黑塔：那么，事不宜迟——第四面镜！
            - listitem [ref=e386]: 第四面镜：轮到我登场啦！终于不用坐冷板凳了！
            - listitem [ref=e387]: 第四面镜：「思维折射」启动：请仔细阅读安全协议……
            - listitem [ref=e388]: 黑塔：嗯？
            - listitem [ref=e389]: 第四面镜：不，当然不用！我早就帮大家勾选同意啦——目标：翁法罗斯！
            - listitem [ref=e390]: 第四面镜：三，二，一…启动！
          - heading "与外界建立联系，协调银河联军" [level=3] [ref=e391]: 与外界建立联系，协调银河联军
          - list [ref=e392]:
            - listitem [ref=e393]: 星期日：…忆质的流向，如此沉重。
            - listitem [ref=e394]: 星期日：与匹诺康尼的梦境截然不同，这里沉淀着真正以万年为计的史诗。
            - listitem [ref=e395]:
              - text: 黑天鹅：创世涡心，一切神话的起点与终点。而在
              - generic [ref=e396]:
                - generic [ref=e397]: 开拓者
                - generic [ref=e398]: 无名客
              - text: 开创的新世界里……
            - listitem [ref=e399]: 黑天鹅：无尽的轮回已被打破了。
            - listitem [ref=e400]: 姬子：布下「开拓」的信标，与外界建立联系吧。
            - listitem [ref=e401]: 黑天鹅：那…交给各位了。我不便在流光忆庭面前现身。
            - listitem [ref=e402]: 黑天鹅：还有星期日先生，也不适合露面，对吧？
            - listitem [ref=e403]: 星期日：同意。
          - separator [ref=e404]
          - list [ref=e405]:
            - listitem [ref=e406]: 姬子：星穹列车已着陆。若能接收到这条讯息，请立即回复。完毕。
            - listitem [ref=e407]: 符玄：这里是仙舟联盟，通讯正常。
            - listitem [ref=e408]: 砂金：星际和平公司，通讯正常。
            - listitem [ref=e409]: 砂金：巡海游侠没有回应？倒也正常。只是没想到，这紧要关头家族却默不作声。
            - listitem [ref=e410]: 翡翠：未免太不把匹诺康尼的独立董事放在眼里了。好久不见，姬子小姐。
            - listitem [ref=e411]: 姬子：久违了，翡翠女士。
            - listitem [ref=e412]: 翡翠：这场战役的重要性，足以和「诛罗讨伐战」相提并论。唯有得胜，方能驱散笼罩万千世界的「铁墓」阴影。
            - listitem [ref=e413]: 翡翠：如此「存护」大业，石心十人必当倾尽全力。
            - listitem [ref=e414]: 砂金：翡翠女士牵头博识学会，对铁墓的过往活动进行了专项研究。
            - listitem [ref=e415]: 砂金：一个坏消息，「智识」的溃败不限于无机体。
            - listitem [ref=e416]: 瓦尔特：你的意思是，铁墓还会感染有机生命？
            - listitem [ref=e417]: 砂金：好消息是：截至目前，它对有机体的影响可控。感染进程缓慢，造成的神经病变也不致命。
            - listitem [ref=e418]: 砂金：无论如何，公司会在48个系统时内，确保医疗体系内的星域实现针对性疫苗覆盖。
            - listitem [ref=e419]:
              - text: 符玄：那其他星域呢？都这时候了，
              - generic [ref=e420]:
                - generic [ref=e421]: 补天司命
                - generic [ref=e422]: 「存护」克里珀
              - text: 的拥趸还打着生意算盘？
            - listitem [ref=e423]: 翡翠：我记得您，太卜。第三次丰饶民战争，您的表现令人印象深刻。
            - listitem [ref=e424]: 翡翠：请放心，所有世界都可以向公司购买疫苗，并享受人道主义折扣——目前的方针是这样。
            - listitem [ref=e425]: 翡翠：但如果仙舟联盟愿意驰援公司在艾普瑟隆等星系的资产，我们就有更多手牌，向董事会重申深度合作的必要性。
            - listitem [ref=e426]: 符玄：星际和平娱乐的总部在艾普瑟隆，倒是不难理解。但名单上的其他世界……
            - listitem [ref=e427]: 符玄：为何尽是些「欢愉」垂迹之地？
            - listitem [ref=e428]: 砂金：就把它当作一场长远的投资吧。还请见谅：庇尔波因特上下都在为铁墓忙作一团——尤其是市场开拓部——石心十人难免力有不逮。
            - listitem [ref=e429]: 砂金：若有联盟相助，对全银河都有益无害，不是么？
            - listitem [ref=e430]: 符玄：仙舟古语有云，达则兼济天下。你们的提议自有七天将裁夺，我只负责转达。
            - listitem [ref=e431]: 符玄：大难当前，若能扶危济困，罗浮定义不容辞。但一切的前提是，公司必须无条件协助联盟在灾区的抢险救援工作。
            - listitem [ref=e432]: 翡翠：当然——以「存护」的名义，一切献给琥珀王。
            - listitem [ref=e433]: 姬子：感谢各位无私奉献。
          - separator [ref=e434]
          - list [ref=e435]:
            - listitem [ref=e436]: 黑天鹅：看得出来，各方都有些投鼠忌器。
            - listitem [ref=e437]: 星期日：「毁灭」与「智识」的交锋，不仅关乎银河存亡，更是各方势力洗牌的时刻啊。
            - listitem [ref=e438]: 姬子：与一位绝灭大君为敌，再谨慎都不为过。存亡面前，人人平等。
            - listitem [ref=e439]: 瓦尔特：无论如何，静候佳音吧。
            - listitem [ref=e440]: 瓦尔特：我们也是时候深入涡心，去看看翁法罗斯内部的样貌了。
          - heading "（可选）尝试与盟军联系" [level=3] [ref=e441]: （可选）尝试与盟军联系
          - blockquote [ref=e442]:
            - paragraph [ref=e443]: 征讨「铁墓」之役关乎银河存亡，各方势力都有基于自身利益的考量。在联军会议之后，或许应与同盟者们展开更深入的交流，凝聚各方力量。
            - generic [ref=e444]:
              - img "图标-位置.png" [ref=e445]
              - text: 翁法罗斯-创世涡心
          - generic [ref=e446]:
