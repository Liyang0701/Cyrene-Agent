            - generic [ref=e587]: 折叠
          - listitem [ref=e588]: 黑天鹅：伟岸…说来，我曾在开拓者的记忆中，瞥见他/她化身万丈高的塔塔洛夫。莫非……
          - listitem [ref=e589]: 永夜之帷，三月七：「怎么可能，那只是一个美好…呃，对开拓者来说美好的梦境吧！」
          - listitem [ref=e590]: 星期日：若是背负世界的「全世之座」…也许能为一位彷徨星间的旅人指明前路吧。
          - listitem [ref=e591]: 永夜之帷，三月七：「呀，你怎么也虔诚起来了？开拓者的建议，有时候听起来傻乎乎的哦。」
          - listitem [ref=e592]: 星期日：所谓的「愚人」和「世界」…本就只有一步之遥。
          - separator [ref=e593]
          - list [ref=e594]:
            - listitem [ref=e595]: 希瑞雅：全体公民，看啊——最后的泰坦，「负世」的开拓者将要醒来！
            - listitem [ref=e596]: 希瑞雅：古老的神明，您忠诚的子民，迷茫的信徒，无畏的战友，已尽数跪拜于王座前。
            - listitem [ref=e597]: 希瑞雅：请从万古的长眠中苏醒，降下全世的神谕吧！
