            - listitem [ref=e455]: 姬子：放心，我们还在按部就班地推行计划。贝洛伯格那边如何？
            - listitem [ref=e456]: 托帕：雅利洛-Ⅵ位于「存护」壁垒外沿。虽然不会承受第一波冲击，但仍有余波威胁风险。
            - listitem [ref=e457]: 希露瓦：杰帕德那小子和佩拉一起，忙着组织银鬃铁卫收缩战线、修筑战壕呢；希儿和玲可刚从地髓矿脉的生产链回来…哎，要不要说两句？
            - listitem [ref=e458]: 希儿：…没什么好说的，动摇军心。叫他们注意安全就行。
