            - listitem [ref=e425]: 白厄：没错，只要前进就好。用你自己的方式——
            - listitem [ref=e426]: 白厄：为翁法罗斯，带来真正的黎明吧。
            - listitem [ref=e427]: 开拓者：以「负世」之名，我向你保证：刻法勒永志不忘。
            - listitem [ref=e428]: 开拓者：至此，让我们所有人踏上最后的伟大征程。
            - listitem [ref=e429]: 开拓者：与我一同，成为英雄吧！
