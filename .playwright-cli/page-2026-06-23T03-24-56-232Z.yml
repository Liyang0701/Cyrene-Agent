          - list [ref=e387]:
            - listitem [ref=e388]: 昔涟：……
            - listitem [ref=e389]: 昔涟：我知道，你在看着，对吗？
            - listitem [ref=e390]: 昔涟：最初的「PhiLia」。
            - listitem [ref=e391]: ？？？：……
            - listitem [ref=e392]: 昔涟：好奇怪呀，到最后，我也没能找回这三千万世的记忆。
            - listitem [ref=e393]: 昔涟：但那不重要了，对不对？我会做出和你一样的选择，因为人家的魅力就是始终如一。
            - listitem [ref=e394]: 昔涟：逐火是不断失却的旅途，可就算一切随风逝去，也有一种感情会被留下来……
            - listitem [ref=e395]: 昔涟：「爱」会永远存在，对吗？
            - listitem [ref=e396]: ？？？：……
            - listitem [ref=e397]: ？？？：为这个我们深爱的世界，写下不同以往的结局吧♪
            - listitem [ref=e398]: 昔涟：众神啊，看哪！翁法罗斯已完成了她的胜利，再创世即将到来——
            - listitem [ref=e399]: 昔涟：那辉煌的灵魂已临到此地，行走过熙熙攘攘的黑夜；他/她携来黄金的火与血，胜利地步入白昼——
            - listitem [ref=e400]: 开拓者：翁法罗斯！我并非陡然呼唤你的名字。我来此，是为了讲述历史——
            - listitem [ref=e401]: 开拓者：此世，他们将燃烧的金血熔进身躯。
            - listitem [ref=e402]: 开拓者：来日的命运，可会记得他们的姓名？
            - listitem [ref=e403]: 缇里西庇俄丝：那要记住的名字，是不是有点太多啦！
            - listitem [ref=e404]: 缇里西庇俄丝：三千万乘以一千，不对，是一千零一……
            - listitem [ref=e405]: 缇里西庇俄丝：好啦，现在别纠结这个了。如果*我们*变多了，那翁法罗斯的「门径」也会变得更多！
            - listitem [ref=e406]: 缇里西庇俄丝：一同抵达鲜花芬芳的西风尽头——明天见！
            - listitem [ref=e407]: 刻律德菈：如此一来，世人不必再受唯一法则制约，而要做自己的「律法」。
            - listitem [ref=e408]: 刻律德菈：凯撒的身躯在群星面前略显矮小，但足以成为世界的基石——成就最伟大的帝国。
            - listitem [ref=e409]: 海瑟音：看来，会是一场永不落幕的欢宴呢。
            - listitem [ref=e410]: 海瑟音：愿鱼儿从不离开「海洋」，愿来日…如明珠般璀璨。
            - listitem [ref=e411]: 风堇：让温柔的「天空」呵护世间。不再分贵贱高低，只有你、我，还有大家共同的心愿。
            - listitem [ref=e412]: 那刻夏：无论「理性」，还是缺陷，皆由我亲手种下。如果还要说什么——劝来世学者别把我捧上神坛，物尽其用吧。
            - listitem [ref=e413]: 阿格莱雅：祝那新生的黎明，令世界目光常亮。抗争或许苦涩，但「浪漫」从不灭亡。
            - listitem [ref=e414]: 万敌：以歌耳戈之子的名义：勇士将为「纷争」而战，不以荣耀为终点，而在光荣中前行。
            - listitem [ref=e415]: 遐蝶：即便「死亡」终将分离你我，也请让每一次相拥不留遗憾。
            - listitem [ref=e416]: 赛飞儿：都这么正经？那我就许愿沙漠永远有水，好土永远有黄金，人间一切都能用「诡计」换来吧！
            - listitem [ref=e417]: 丹恒：「大地」会拱卫往世、此世与来世，生生不息——
            - listitem [ref=e418]: 三月七：轮、轮到我了吗？那，就让「岁月」守望过去，指引未来——
            - listitem [ref=e419]: 开拓者：就像「开拓」。
            - listitem [ref=e420]:
              - text: 白厄：这么严肃可不像你啊，
