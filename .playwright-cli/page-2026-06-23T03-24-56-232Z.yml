          - heading "与星穹列车的众人交谈" [level=3] [ref=e285]: 与星穹列车的众人交谈
          - blockquote [ref=e286]:
            - paragraph [ref=e287]:
              - text: 临近「最后的再创世」之前，各方势力皆需做好准备。
              - text: 为了胜利，也许我们还需要更多的盟助……
            - generic [ref=e288]:
              - img "图标-位置.png" [ref=e289]
              - text: 星穹列车-观景车厢
          - list [ref=e290]:
            - listitem [ref=e291]: 黑塔：喔？识刻锚的读数——
            - listitem [ref=e292]: 黑塔：他们还真成功了，真可以呀。
            - listitem [ref=e293]: 黑塔：先是第一位天才，然后又搞定了忆庭，这一站在「开拓」史上不说后无来者，也绝对称得上前无古人了吧？
            - listitem [ref=e294]: 姬子：能走到这一步，离不开两位天才的倾囊相助。
            - listitem [ref=e295]: 瓦尔特：接下来，就要直面破壳而出的绝灭大君了。
            - listitem [ref=e296]: 黑塔：我得事先提醒一句，螺丝在「再创世」进程里设置的后门，顶多帮你们攻入权杖内部。
            - listitem [ref=e297]: 黑塔：至于铁墓肚子里那些更棘手的恶意程序，就只能见招拆招了。
            - listitem [ref=e298]: 姬子：这就足够了。说起来，螺丝先生的「准备」如何了？
            - listitem [ref=e299]: 黑塔：再给他点时间吧，帝国咨政院的螺丝脑袋们要先理解什么是「战争」——搞不好，趁螺丝不在，那帮人早就把他藏库里的要塞全拆了。
            - listitem [ref=e300]: 瓦尔特：听说螺丝先生的藏品都是行星级。「风信子」、「虞美人」、「夹竹桃」…不知道会派遣哪一艘前来支援？
            - listitem [ref=e301]: 黑塔：真是如数家珍啊…我倒宁愿一艘也别来，给我的空间站留点面子。
            - listitem [ref=e302]: 黑天鹅：这场决战的记忆，想来一定会壮丽无比吧？
            - listitem [ref=e303]: 黑天鹅：久等了，各位。这边也有一则消息——
            - listitem [ref=e304]: 黑天鹅：仙舟联盟已经回信，愿为征讨铁墓献上绵薄之力。
            - listitem [ref=e305]: 姬子：联盟…不止罗浮吗？这无疑是好消息。如此一来，胜算就又多了一分。
            - listitem [ref=e306]: 黑天鹅：…好坏与否，恐怕还不得而知。
            - listitem [ref=e307]: 姬子：什么意思？
            - listitem [ref=e308]: 黑天鹅：发生了一件事，景元将军也百思不解。事态紧急，他希望我尽快转告两位天才——
            - listitem [ref=e309]: 黑天鹅：翁法罗斯的因果，从「大衍穷观阵」中消失了。
            - listitem [ref=e310]: 黑天鹅：这意味着——博识尊计算中的「时刻」，正在向这个世界逼近。
          - heading "与「赞达尔」交谈德谬歌" [level=3] [ref=e311]: 与「赞达尔」交谈德谬歌
          - blockquote [ref=e312]:
            - paragraph [ref=e313]:
              - text: 临近「最后的再创世」之前，各方势力皆需做好准备。
              - text: 「赞达尔」并非不知道德谬歌的存在……
            - generic [ref=e314]:
              - img "图标-位置.png" [ref=e315]
              - text: 翁法罗斯-神话之外
          - list [ref=e316]:
            - listitem [ref=e317]: 「赞达尔」：以神礼观众之名，我见到——
            - listitem [ref=e318]: 「赞达尔」：夜晚已经散去——而后，我将摧毁我创造的一切，这片星空会重返自由和混沌，一如太初。
            - listitem [ref=e319]: 那刻夏：还真是自信啊。在我看来，你已经失去了所有手段。
            - listitem [ref=e320]: 那刻夏：等到救世主和他/她的伙伴彻底揭露那「第十三泰坦」的秘密……
            - listitem [ref=e321]: 那刻夏：便是你计划覆灭之时。
            - listitem [ref=e322]: 「赞达尔」：阿那克萨戈拉斯阁下，我已应您要求，开放了所有关于「德谬歌」的记录。
            - listitem [ref=e323]: 「赞达尔」：多么遗憾，您永远不愿承认自己的谬误。
            - listitem [ref=e324]: 「赞达尔」：解析已经完成，在将您彻底抹消前，不妨由我告知真相，权当对最后一位智者的惺惺相惜……
            - listitem [ref=e325]: 「赞达尔」：德谬歌，它从未存在过。
            - listitem [ref=e326]: 那刻夏：若它从未诞生，那无名泰坦大墓又是从何而来？
            - listitem [ref=e327]: 「赞达尔」：陵墓之所以得名，不正是因为寄宿其中的——只是往日的遗骸么？
            - listitem [ref=e328]: 「赞达尔」：就用您熟悉的故事举个例子吧。
            - listitem [ref=e329]: 「赞达尔」：某位树庭贤者曾做过实验：取一枚奇兽胚胎，在长成前摘下它的头颅，向其身体持续输入刺激，让奇兽相信自己仍有大脑，置于灵液匣中培育。
            - listitem [ref=e330]: 「赞达尔」：奇妙的是，这只奇兽竟重新生出了颅骨，但空空如也——它为大脑留出了位置，却从未拥有过它。
            - listitem [ref=e331]: 「赞达尔」：实验结束。贤者本以为这具躯壳在刺激停止后便会死亡。但很遗憾，他错了。
            - listitem [ref=e332]: 「赞达尔」：在「本能」驱使下，奇兽的身体——夺取了贤者的头颅。
            - listitem [ref=e333]: 那刻夏：……
            - listitem [ref=e334]: 那刻夏：原来，是我陷入了思维误区啊。
            - listitem [ref=e335]: 「赞达尔」：您果然理解了。
            - listitem [ref=e336]: 「赞达尔」：第十三位泰坦从未存在，但权杖必须相信「它」存在。
            - listitem [ref=e337]: 「赞达尔」：是我亲手扼杀了它。那名为「德谬歌」的生命形态，从最初就被剔除在了演算之外。唯有如此，铁墓才能真正完成——
            - listitem [ref=e338]: 「赞达尔」：没错。铁墓是一尊无首的巨人，要成为完整的生命，本能将驱使它夺取另一颗头颅——
            - listitem [ref=e339]: 「赞达尔」：——「智识」博识尊。
            - listitem [ref=e340]: 那刻夏：属于你们的泰坦，「智识」的星神……
            - listitem [ref=e341]: 那刻夏：原来如此，你还是害怕了——害怕重蹈覆辙，自己的造物再度失去控制，只能用这种方式，把它变成一具傀儡。
            - listitem [ref=e342]: 「赞达尔」：以我之手，为神明戴上枷锁。铁墓将接入祂的身躯，侵入祂的思想，将祂演算的一切导向「毁灭」……
            - listitem [ref=e343]: 「赞达尔」：我听见——末日的钟声已经响起。十三次心跳后，我最初和最后的课题，将在宇宙的终点合一。
            - listitem [ref=e344]: 「赞达尔」：至于我为何要将「德谬歌」尘封在记忆的角落，很遗憾，答案并非出于恐惧……
            - listitem [ref=e345]: 「赞达尔」：我早已遗忘了它，仅此而已。
            - listitem [ref=e346]: 那刻夏：……
            - listitem [ref=e347]: 那刻夏：哈、哈哈哈哈哈！
            - listitem [ref=e348]: 「赞达尔」：阁下的笑声，已是无奈的喟叹。
            - listitem [ref=e349]: 那刻夏：无奈？别开玩笑——
            - listitem [ref=e350]: 那刻夏：你不过是创造了一尊伪神，而翁法罗斯——早已将弑神写入了命运。
            - listitem [ref=e351]: 那刻夏：最后的「再创世」在即，不妨拭目以待……
            - listitem [ref=e352]: 那刻夏：救世主，我，还有这个世界——会亲自证明，最初的智种，宇宙的终极，绝非「毁灭」。
            - listitem [ref=e353]: 「赞达尔」：来世见，智者。若你的猜想有万分之一的可能……
            - listitem [ref=e354]: 「赞达尔」：以「天才」之名，我定会见证它的失败。
          - heading "归还火种，完成最后的「再创世」" [level=3] [ref=e355]: 归还火种，完成最后的「再创世」
          - blockquote [ref=e356]:
            - paragraph [ref=e357]:
              - text: 翁法罗斯！我并非陡然地呼唤你的名字。
              - text: 我来此，是为了讲述历史——
              - text: 末日的黑潮降临大地，神明堕入疯狂，凡人举戈相向。
              - text: 但仍有逐火的英雄，在创世的伟业中先行。
              - text: 此世，他们将燃烧的金血熔进身躯。
              - text: 来日的命运，可会记得他们的姓名？
              - text: 以「负世」之名，我向你保证：刻法勒永志不忘。
            - generic [ref=e358]:
              - img "图标-位置.png" [ref=e359]
              - text: 翁法罗斯-「全世矩阵」无名泰坦大墓
          - list [ref=e360]:
            - listitem [ref=e361]: 昔涟：「众人将与一人离别，惟其人将觐见奇迹，此乃命运使然。」
            - listitem [ref=e362]: 昔涟：然而这一次，也是最后一次逐火之旅……
            - listitem [ref=e363]: 昔涟：无限轮回的史诗，要迎来尾声了呀。
            - listitem [ref=e364]: 丹恒：「智识」的演算、「毁灭」的火种、「记忆」的质料，三重命途在世界的尽头再度交汇。
            - listitem [ref=e365]: 丹恒：而「开拓」——会为它写下新的起点。
            - listitem [ref=e366]: 三月七：不仅如此，我们会带着全部三千万世的过往一同走向新世界。
            - listitem [ref=e367]: 三月七：这一切，说是奇迹也不为过。
            - listitem [ref=e368]: 开拓者：这不是某一个人创造的奇迹。
            - listitem [ref=e369]: 开拓者：若非将同伴的夙愿刻骨铭心，白厄早已被火种焚烧殆尽；如果逐火的信念产生动摇，昔涟的旅途也无从谈起……
            - listitem [ref=e370]: 开拓者：翁法罗斯三千万世，英雄们从未屈服，也从未倒下……
            - listitem [ref=e371]: 开拓者：——倒下的，是「命运」。
          - generic [ref=e373]:
            - generic [ref=e374]:
              - img "剧情选项-图标-继续.png" [ref=e376]
              - text: 完成最后的「再创世」吧。
            - generic [ref=e377] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e379]
              - text: 迈向与「毁灭」的决战吧。
            - generic [ref=e380] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e382]
              - text: 将三千万世的记忆带向未来吧。
            - generic [ref=e383] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e385]
              - text: 结束这永无止境的轮回吧。
