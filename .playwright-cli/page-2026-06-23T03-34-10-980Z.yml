            - generic [ref=e380]: 剧情内容
          - heading "进入时光归墟，开启最后的「逐火之旅」" [level=3] [ref=e381]: 进入时光归墟，开启最后的「逐火之旅」
          - blockquote [ref=e382]:
            - paragraph [ref=e383]: 时光归墟…这里是权杖的内核层。白厄就在此处，以怒火铸就监牢，镇压着铁墓的恨意。若想与绝灭大君正面对敌，我们就必须踏上最后一次逐火之旅，收拢由众黄金裔升擢的泰坦们的命运，在他们的帮助下走到白厄面前，消融烈阳的执念。
            - generic [ref=e384]:
              - img "图标-位置.png" [ref=e385]
              - text: 翁法罗斯-「葬忆彼岸」时光归墟
          - list [ref=e386]:
            - listitem [ref=e387]: 永夜之帷，三月七：真没想到，咱有朝一日还能坐上开拓者化身的列车……
            - listitem [ref=e388]: 昔涟：不知真正的星穹列车坐感如何，但愿不会这么…颠簸。
            - listitem [ref=e389]: 磐岩之脊，丹恒：总算…到站了。
            - listitem [ref=e390]: 磐岩之脊，丹恒：漫天风沙，还有破碎的废墟。
            - listitem [ref=e391]: 永夜之帷，三月七：好可怕的热浪，连「开拓」都抵御不了……
            - listitem [ref=e392]: 磐岩之脊，丹恒：这座监牢，说是以白厄的怒火铸成也不为过。
            - listitem [ref=e393]: 昔涟：但愤怒总有平息的那一天……
            - listitem [ref=e394]: 昔涟：我们正是为此而来，对吧，开拓者？
          - generic [ref=e396]:
            - generic [ref=e397]:
              - img "剧情选项-图标-继续.png" [ref=e399]
              - text: 该出发了，别让白厄久等。
            - generic [ref=e400] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e402]
              - text: 所有人一起，成为救世主吧！
            - generic [ref=e403] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e405]
              - text: 这一刻，全银河都在「开拓」身后。
          - list [ref=e406]:
            - listitem [ref=e407]: 全世之座，开拓者：启程吧——踏上最后的「逐火之旅」。
          - heading "召集「最后的泰坦」们，准备迎战铁墓" [level=3] [ref=e408]: 召集「最后的泰坦」们，准备迎战铁墓
          - definition [ref=e410]: 与万敌对话
          - list [ref=e411]:
            - listitem [ref=e412]: 天谴之矛，迈德漠斯：西风尽头，竟是一片狼藉的沙场啊。
            - listitem [ref=e413]: 天谴之矛，迈德漠斯：……
            - listitem [ref=e414]: 天谴之矛，迈德漠斯：等你们很久了，天外的英雄。
            - listitem [ref=e415]: 天谴之矛，迈德漠斯：星穹列车的开拓者，对么？
            - listitem [ref=e416]: 昔涟：看来，不用再多做解释了呀。
            - listitem [ref=e417]: 天谴之矛，迈德漠斯：我是「纷争」的神王，也是悬锋城的「万敌」。三千万世因果加诸此身——
            - listitem [ref=e418]: 天谴之矛，迈德漠斯：我们——最后的十二泰坦——已准备好为世界的命运鏖战。
          - generic [ref=e420]:
            - generic [ref=e421]:
              - img "剧情选项-图标-继续.png" [ref=e423]
              - text: 这不是我们第一次并肩。
            - generic [ref=e424] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e426]
              - text: 可惜，我们只同行过一世。
            - list [ref=e428]:
              - listitem [ref=e429]: 天谴之矛，迈德漠斯：当然。那一程记忆犹新，我不会忘记。
          - list [ref=e430]:
            - listitem [ref=e431]: 天谴之矛，迈德漠斯：往事历历在目，就连每一次横渡冥河的风景，也前所未有地清晰。更不必说逐火之旅的同道，和哀丽秘榭的昔涟……
            - listitem [ref=e432]: 天谴之矛，迈德漠斯：还有你，第十三位泰坦。
            - listitem [ref=e433]: 昔涟：看来，人家的身份已经不是秘密了。
            - listitem [ref=e434]: 昔涟：这意味着，她的牺牲和努力，没有被世界遗忘，对吗？
            - listitem [ref=e435]:
              - text: 天谴之矛，迈德漠斯：
              - generic [ref=e436]:
                - generic [ref=e437]: 最初的涟漪
                - generic [ref=e438]: PhiLia093
              - text: ，她理应和所有人一起抵达故事的结局。
            - listitem [ref=e439]: 天谴之矛，迈德漠斯：既然你已接过她的纸笔，就书写吧——与我们一同，向命运发起强有力的抗争，直到一切尘埃落定。
            - listitem [ref=e440]: 天谴之矛，迈德漠斯：然后，再在史诗的后记，署下她的姓名。
          - separator [ref=e441]
          - list [ref=e442]:
            - listitem [ref=e443]: 天谴之矛，迈德漠斯：这最后一役，「灾厄」将与翁法罗斯同在。
            - listitem [ref=e444]: 天谴之矛，迈德漠斯：这片战场，正是众神与黑潮死斗的证明。
            - listitem [ref=e445]: 天谴之矛，迈德漠斯：我们浴血捍卫那柄利剑，它刺向的深渊——就是「铁墓」的温床。
            - listitem [ref=e446]: 磐岩之脊，丹恒：脚下这片大地，是死的。深处是一片空洞，仿佛地核从未形成。
            - listitem [ref=e447]: 磐岩之脊，丹恒：我听见了…白厄的心跳。很微弱，恐怕他只剩一息尚存。
            - listitem [ref=e448]: 天谴之矛，迈德漠斯：三千万次轮回，我与「侵晨」交锋过不可数的日夜。若你了解那个男人，就会知道……
            - listitem [ref=e449]: 天谴之矛，迈德漠斯：恰恰是那最后一丝火焰，绝无可能熄灭。
            - listitem [ref=e450]: 天谴之矛，迈德漠斯：这一世，「纷争」的诗篇将不再以据守悬锋作结，而要踏上不绝的征程——
            - listitem [ref=e451]: 天谴之矛，迈德漠斯：我乃天谴之矛，迈德漠斯。以我的一千道伤疤和一百条性命——
            - listitem [ref=e452]: 天谴之矛，迈德漠斯：换取「毁灭」——在史诗中永恒的终结！
          - definition [ref=e454]: 进入战斗并获胜
          - list [ref=e455]:
            - listitem [ref=e456]: 天谴之矛，迈德漠斯：不堪一击。
            - listitem [ref=e457]: 永夜之帷，三月七：也太强了吧，根本轮不到咱们出手……
            - listitem [ref=e458]: 天谴之矛，迈德漠斯：可惜，金血仍与铁墓同源。只怕和这些走卒一样，众神即便并肩作战，也会被它分而治之，逐个击破。
            - listitem [ref=e459]: 磐岩之脊，丹恒：你的意思是……
            - listitem [ref=e460]: 天谴之矛，迈德漠斯：若要为「毁灭」带去「毁灭」，我们必须合而为一。
            - listitem [ref=e461]: 天谴之矛，迈德漠斯：拿去吧。
            - listitem [ref=e462]: 天谴之矛，迈德漠斯：悬锋印戒。我每一世诞生与死亡的见证，它是「万敌」未尽的命运……
            - listitem [ref=e463]: 天谴之矛，迈德漠斯：最适合成为「记忆」的质料。
            - listitem [ref=e464]: 天谴之矛，迈德漠斯：你能做到，对么？
            - listitem [ref=e465]: 昔涟：三千万世的使命和责任，格外沉重呢……
            - listitem [ref=e466]: 磐岩之脊，丹恒：你…不打算和我们同行了么？
            - listitem [ref=e467]: 天谴之矛，迈德漠斯：什么话……
            - listitem [ref=e468]: 天谴之矛，迈德漠斯：我早已是遍入天地的「纷争」，这世间必要的伤痕。站在你们面前的，不过是万千神躯的一具。
            - listitem [ref=e469]: 天谴之矛，迈德漠斯：带上这枚印戒，便是与我同行。用它开辟前路，写下「救世之因」。
            - listitem [ref=e470]: 万敌：以凡人之名——「纷争的冠军，万敌」——此人为荣耀和自由迈向群星，并如愿以偿！
            - listitem [ref=e471]: 万敌：「前进吧，英雄们。向着深渊进军，实现翁法罗斯的夙愿。」
            - listitem [ref=e472]: 万敌：「然后——在破碎的焦土上——重新建起繁荣的城邦。」
