            - listitem [ref=e546]: 万敌：「久违了，赛法利娅女士。」
            - listitem [ref=e547]: 赛飞儿：「咱们同行的桥段可不多见。」
            - listitem [ref=e548]: 赛飞儿：「二缺一，不知蜗居公主什么时候来？」
          - separator [ref=e549]
          - definition [ref=e551]: 与遐蝶对话
          - list [ref=e552]:
            - listitem [ref=e553]: 灰黯之手，遐蝶：就连这具身躯，也被你铸成了枷锁么？
            - listitem [ref=e554]: 灰黯之手，遐蝶：我很高兴能与你再次相见……
            - listitem [ref=e555]: 灰黯之手，遐蝶：开拓者阁下。
            - listitem [ref=e556]: 开拓者：遐蝶……
            - listitem [ref=e557]: 灰黯之手，遐蝶：回首往日，属于我的「拯救」只有一次，我救下的生命也唯有一人。
            - listitem [ref=e558]: 灰黯之手，遐蝶：能以这双手为更辽阔的世界送去希望…即便在梦中，也是难以想象的奢求。
          - generic [ref=e560]:
            - generic [ref=e561]:
              - img "剧情选项-图标-继续.png" [ref=e563]
              - text: 我们正在挽救无数生命。
            - generic [ref=e564] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e566]
              - text: 我们会一起走向辽阔的星空。
          - list [ref=e567]:
            - listitem [ref=e568]: 灰黯之手，遐蝶：嗯。我…不会忘记。
            - listitem [ref=e569]: 磐岩之脊，丹恒：盗火行者？为什么会在这里。
            - listitem [ref=e570]: 灰黯之手，遐蝶：这是最初的「卡厄斯兰那」，也是白厄阁下至深的伤痕。
            - listitem [ref=e571]: 灰黯之手，遐蝶：他以怒火铭记背负的一切，可当余温散去，留下的便只有冰冷的悔恨。
            - listitem [ref=e572]: 灰黯之手，遐蝶：相同的躯壳，我在轮回中收殓过无数次。唯有这一具，他的伤痛…深不见底。
            - listitem [ref=e573]: 赛飞儿：「他守在这里，没准是在等我们呢。」
            - listitem [ref=e574]: 万敌：「等待曾经的『敌人』，再度来到他的面前。」
            - listitem [ref=e575]: 灰黯之手，遐蝶：……
            - listitem [ref=e576]: 灰黯之手，遐蝶：他希望我们，作何回应呢？
            - listitem [ref=e577]: 万敌：「显而易见——」
            - listitem [ref=e578]: 万敌：「即便要再轮回上千亿次，我仍会将自己的弱点托付给你。」
            - listitem [ref=e579]: 万敌：「所以，扔掉悔恨吧，新兵。你已物尽其用，不再需要它了。」
            - listitem [ref=e580]: 赛飞儿：「嘿，我可没这么好说话。每次打我都重拳出击，懂不懂怜香惜玉啊？」
            - listitem [ref=e581]: 赛飞儿：「好自为之吧你！要是决战时唯唯诺诺，可要让全银河看笑话啦。」
            - listitem [ref=e582]: 灰黯之手，遐蝶：…是啊。请相信我们，迷途的灵魂。
            - listitem [ref=e583]: 灰黯之手，遐蝶：跨越三千万次轮回，如今，每一位逐火者的光芒，都足以将来路照亮。
            - listitem [ref=e584]: 灰黯之手，遐蝶：我敬请你，安眠于此……
            - listitem [ref=e585]: 灰黯之手，遐蝶：自那悲恸的土壤中，开出释然的花。
            - listitem [ref=e586]: 永夜之帷，三月七：没有地动山摇，出乎意料地平静……
            - listitem [ref=e587]: 昔涟：也许，「卡厄斯兰那」已经了却遗憾。
            - listitem [ref=e588]: 磐岩之脊，丹恒：还有一种可能，他设下的封印不止这一处。
            - listitem [ref=e589]: 灰黯之手，遐蝶：那么，我也该和各位一道启程了。
            - listitem [ref=e590]: 灰黯之手，遐蝶：请带上这朵安提灵花。我想，如果有什么能诉说「遐蝶」的故事……
            - listitem [ref=e591]: 灰黯之手，遐蝶：这朵寻常却坚强的花儿，已经足够合适。
            - listitem [ref=e592]: 万敌：「……」
            - listitem [ref=e593]: 灰黯之手，遐蝶：也许你还记得，万敌阁下。在与开拓者同行的那一世，你对我说过……
            - listitem [ref=e594]: 灰黯之手，遐蝶：「掌控你能掌控之事，待那无可逃避的命运降临时。」
            - listitem [ref=e595]: 万敌：「再用那强有力的意志，反抗它的摆弄。」
            - listitem [ref=e596]: 灰黯之手，遐蝶：我想，我已经做到了。在逐火的行列里，抬头挺胸地前进……
            - listitem [ref=e597]: 遐蝶：告别死亡之名——「来生的侍女，遐蝶」——希望这一名讳能为星空铭记……
            - listitem [ref=e598]: 遐蝶：「然后，如人那般生……」
            - listitem [ref=e599]: 遐蝶：「如人那般死。」
