          - separator [ref=e480]
          - definition [ref=e482]: 与赛飞儿对话
          - list [ref=e483]:
            - listitem [ref=e484]: 翻飞之币，赛法利娅：「焚风」？这名字像我跟小王子合体啊。
            - listitem [ref=e485]: 翻飞之币，赛法利娅：哎呀，终于来了，灰子！还有……
            - listitem [ref=e486]: 翻飞之币，赛法利娅：呃。两位姑娘，长得还真像呀？
            - listitem [ref=e487]: 翻飞之币，赛法利娅：别急，让我猜猜。这位粉头发的，想必就是「最初的智种」，德喵…德谬歌小姐！
            - listitem [ref=e488]: 翻飞之币，赛法利娅：而另一位戴了朵花的，肯定是列车组的三月小妹啦？
          - generic [ref=e490]:
            - generic [ref=e491]:
              - img "剧情选项-图标-继续.png" [ref=e493]
              - text: 听君一席话，如听一席话。
            - generic [ref=e494] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e496]
              - text: 她们俩确实有点像。
            - generic [ref=e497] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e499]
              - text: 那你眼神真的很好了。
            - list [ref=e501]:
              - listitem [ref=e502]: 昔涟：可她说的没错。世上就是有相似的花儿呀。
          - list [ref=e503]:
            - listitem [ref=e504]: 翻飞之币，赛法利娅：开个玩笑。瞧你们，一个个愁眉苦脸的，怎么能搞好救世呢？
            - listitem [ref=e505]: 翻飞之币，赛法利娅：不如来点好消息吧：这地方呀，乍看是座废墟，但是个人都能猜到，肯定没这么简单——
          - separator [ref=e506]
          - list [ref=e507]:
            - listitem [ref=e508]: 翻飞之币，赛法利娅：看。我掘地三千尺，总算挖出了点宝贝。
            - listitem [ref=e509]: 磐岩之脊，丹恒：金色的羽毛……
            - listitem [ref=e510]: 翻飞之币，赛法利娅：眼熟不？是那救世小子身上的，它出现在这里，只证明一件事——
            - listitem [ref=e511]: 翻飞之币，赛法利娅：这片废墟，是他用三千万世残躯堆成的「封印」哪。
            - listitem [ref=e512]: 白厄：不必考量本心，不必渴求胜利。若我生来就是罪恶的容器……
            - listitem [ref=e513]: 白厄：那就向着罪恶怒吼，为后世「开拓」黎明！
            - listitem [ref=e514]: 磐岩之脊，丹恒：原来如此，他以这种方式囚禁铁墓，为外界争取时间。
            - listitem [ref=e515]: 翻飞之币，赛法利娅：是他的风格。人都说猫有好几条命，但活了死、死了又活，来来回回千万次，换谁都遭不住。
            - listitem [ref=e516]: 翻飞之币，赛法利娅：怕是，也只有他能忍受了。
          - generic [ref=e518]:
            - generic [ref=e519]:
              - img "剧情选项-图标-继续.png" [ref=e521]
              - text: 如今，白厄不再孤身一人。
            - generic [ref=e522] [cursor=pointer]:
              - img "剧情选项-图标-继续.png" [ref=e524]
              - text: 他相信我们一定会来…
          - list [ref=e525]:
            - listitem [ref=e526]: 翻飞之币，赛法利娅：当然，我早有预感，提前帮你们打过招呼了。他很开心，在梦里也笑出了声……
            - listitem [ref=e527]: 翻飞之币，赛法利娅：毕竟，死者可听不见「诡计」的谎言哪。
            - listitem [ref=e528]: 翻飞之币，赛法利娅：喂，救世小子——！抱歉啊，这一回，你日夜惦记的英雄们真来了——！
            - listitem [ref=e529]: 翻飞之币，赛法利娅：所以，再坚持一会儿吧——！这一路过来，让你久等啦——！
            - listitem [ref=e530]: 磐岩之脊，丹恒：请与我们结伴而行，赛飞儿，为世界争取明天的日出。
            - listitem [ref=e531]: 昔涟：这一次，它的光明不必再靠谎言维系。
            - listitem [ref=e532]: 翻飞之币，赛法利娅：真想不到啊，到头来，我也是英雄的一员了？
            - listitem [ref=e533]: 赛飞儿：好啊，那就这么写吧——「诡计的羁客，赛飞儿」——她只想沙漠永远有水，好土永远有黄金，盗贼也能做英雄！
            - listitem [ref=e534]: 赛飞儿：「喏，翻飞之币，拿好啦。需要跑路的时候，就把它高高抛上天空吧。」
            - listitem [ref=e535]: 赛飞儿：「还有，后来的观众，都给我记着：她虽然有点贪财，又爱说谎，但从没失过言哪！」
