            - listitem [ref=e856]: 满溢之杯，海列屈拉：在我看来，这不是坏事。
            - listitem [ref=e857]: 满溢之杯，海列屈拉：灰鱼儿，终于到了呢。
            - listitem [ref=e858]: 公正之秤，刻律德菈：没有律法，没有对垒，惟有一头行将消亡的困兽，和同仇敌忾的「逐火精神」——
            - listitem [ref=e859]: 公正之秤，刻律德菈：无趣。
            - listitem [ref=e860]: 永夜之帷，三月七：这地方，还真是僻静……
            - listitem [ref=e861]: 满溢之杯，海列屈拉：凯撒，要告诉他们吗？
            - listitem [ref=e862]: 公正之秤，刻律德菈：你来判断。
            - listitem [ref=e863]: 满溢之杯，海列屈拉：同各位分享我们的发现：这片仙境——连同「毁灭」——似乎在本能地排斥我和凯撒。
            - listitem [ref=e864]: 满溢之杯，海列屈拉：或许是因为，白厄活跃的年代，与第一次逐火之旅相去甚远。
            - listitem [ref=e865]: 满溢之杯，海列屈拉：即便在那些保有理智的轮回中，他和我们…也从未越过「合作」的界限。
            - listitem [ref=e866]: 公正之秤，刻律德菈：身陷樊笼，他依旧没有放下戒心，这是好事。
            - listitem [ref=e867]: 公正之秤，刻律德菈：那男人心中看似空无一物，憎恨却相当鲜明。自然也容不得一位凌驾于世界的王，和她的锋刃。
            - listitem [ref=e868]: 永夜之帷，三月七：可这样一来，两位岂不是没法跟我们一起走了？
            - listitem [ref=e869]: 公正之秤，刻律德菈：你想让我们化作「记忆」同行？
            - listitem [ref=e870]: 昔涟：正是。如此一来，星空将铭记一对伟大的君臣……
