            - listitem [ref=e873]: 满溢之杯，海列屈拉：……
            - listitem [ref=e874]: 公正之秤，刻律德菈：只有通过那本书，我们才能在历史上留下姓名么？
            - listitem [ref=e875]: 昔涟：我想…《如我所书》只是一种媒介。「记忆」有千万种方法凝固时光。
